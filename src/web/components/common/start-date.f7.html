<template>

  ${universeWebService?.showStartDateLink() ? $h`
    <div class="block start-date-link">
      You are viewing the ${universeWebService.getStartDate()} season. Click <a href="${url}" data-reload-current="true" data-force="true" data-browser-history="true">here</a> to view the current season.
    </div>
  ` : $h` 
    <span />    
  `}


</template>



<script>

  import { ContainerService } from "../../../service/container-service"
  import { WalletService } from "../../../service/wallet-service"
  import { LoginWebService } from "../../service/login-web-service"
  import { UniverseWebService } from "../../service/universe-web-service"

  import { ethers } from "ethers"

  export default (props, { $on, $f7, $update }) => {

    let walletService = ContainerService.getInstance("WalletService")
    let eventTarget = ContainerService.getInstance("eventTarget")
    let loginWebService = ContainerService.getInstance(LoginWebService)
    let universeWebService = ContainerService.getInstance(UniverseWebService)

    let currentRoute
    let startDate

    let url

    // const currentClick = (e) => {
    //   $f7.views.main.router.navigate(url, { reloadCurrent: true, history: true, browserHistory: true, ignoreCache: true })
    // }

    eventTarget.addEventListener('set-start-date', async (e) => {

      startDate = e.detail.startDate
      currentRoute = e.detail.currentRoute

      const removeStartDate = ( uri ) => {
        // Create url with base
        const base = window.location.origin; // Could also be a fixed value e.g. http://example.com
        const url = new URL( uri, base );
        
        url.searchParams.delete("startDate")
        // url.searchParams.append("ts", new Date().getTime())

        return url

      }

      let newURL = removeStartDate( currentRoute.url )

      url = newURL.pathname + newURL.search

      await $update()
    })

    return $render
  }
</script>
