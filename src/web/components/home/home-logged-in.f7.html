<template es>

  <div class="page" data-name="home" >

    ${teamComponentService.isTeamOwner() && teamComponentService.hasChanges ? $h`
        <div class="fab fab-extended fab-right-bottom color-orange">
            <a href="#" @click="${saveClick}">
                <div class="fab-text">Save Lineup</div>
            </a>
        </div>
    ` : $h` `}

    <div class="page-content ptr-content" @ptr:refresh=${refreshPage}>

        ${vm ? $h`
        
          <div class="fixed-width-content center">

            <div class="list media-list list-outline-ios list-strong">
              <ul>
                <li>
                  <div class="item-content">
                    <div class="item-media">
                      <img src="/image/thumbnail/100/${vm.teamInfo.team.logoId}" width="56" height="56" class="profilePic" />
                    </div>

                    <div class="item-inner">
                      <div class="item-title-row">
                        <div class="item-title">${teamWebService.getTeamName(vm.teamInfo.team)}</div>
                        <div class="item-after">${vm.teamInfo.team.longTermRating.rating.toFixed(0)} ⭐</div>
                      </div>

                      <div class="item-subtitle">
                        ${vm.teamInfo.team.overallRecord.wins}-${vm.teamInfo.team.overallRecord.losses}
                        <span class="separator">|</span>
                        ${statService.formatRatio(vm.teamInfo.team.overallRecord.winPercent)}
                        <span class="separator">|</span>
                        ${universeWebService.displayDiamonds(vm.teamInfo.team.diamondBalance)}
                      </div>

                    </div>
                  </div>
                </li>
              </ul>
            </div>

            <div class="block-title block-title-medium">
              Play
            </div>

            <div class="list media-list list-outline-ios list-strong-ios list-dividers-ios">
              <ul>

                ${isAhead(vm.season) ? $h`
                  <li>
                    <div class="item-content">
                      <div class="item-media">⚠️</div>
                      <div class="item-inner">
                        <div class="item-title-row">
                          <div class="item-title item-title-wrap">Too far ahead</div>
                        </div>
                        <div class="item-text">
                          ${getDaysAhead(vm.season)} day${getDaysAhead(vm.season) === 1 ? '' : 's'} ahead.
                          You may be blocked from queueing.
                        </div>
                      </div>
                    </div>
                  </li>
                ` : $h``}

                ${isSeasonComplete(vm.season) ? $h`
                  <li>
                    <div class="item-content">
                      <div class="item-media">🏁</div>
                      <div class="item-inner">
                        <div class="item-title-row">
                          <div class="item-title item-title-wrap">Season complete</div>
                        </div>
                        <div class="item-text">
                          Final results locked in.
                        </div>
                      </div>
                    </div>
                  </li>
                ` : $h`

                  <li class="game-mode-primary">
                    <a class="item-link item-content ${vm.teamInfo.team.isQueued ? '' : 'bg-color-green text-color-black'}"
                       @click="${vm.teamInfo.team.isQueued ? clickLeaveQueue : openJoinRankedQueuePopup}">
                      
                      <div class="item-media">
                        ${vm.teamInfo.team.isQueued ? '✅' : '🏟️'}
                      </div>

                      <div class="item-inner">

                        <div class="item-title-row">
                          <div class="item-title">
                            ${vm.teamInfo.team.isQueued ? 'You’re in the ranked queue' : 'Join Ranked Queue'}
                          </div>

                          ${vm.teamInfo.team.isQueued ? $h`
                            <div class="item-after">Leave</div>
                          ` : $h`<div class="item-after">Ranked</div>`}
                        </div>

                        <div class="item-text text-color-black">
                          ${vm.teamInfo.team.isQueued
                            ? $h`${getQueuedSubtitle(vm.season)}`
                            : $h`Match against another team near your rating. Ranked games earn rewards and player progression.`}
                        </div>

                      </div>

                    </a>
                  </li>

                  ${!vm.teamInfo.team.isQueued ? $h`
                    <li>
                      <a class="item-link item-content" @click="${clickPlayBot}">
                        <div class="item-media">🤖</div>
                        <div class="item-inner">
                          <div class="item-title-row">
                            <div class="item-title">Play Bot</div>
                            <div class="item-after">Practice</div>
                          </div>
                          <div class="item-text">
                            Practice against a computer opponent. No rewards or player progression.
                          </div>
                        </div>
                      </a>
                    </li>
                  ` : $h` `}


<!-- 
                  <li>
                    <a class="item-link item-content" @click="${clickChallengeFriend}">
                      <div class="item-media">🤝</div>
                      <div class="item-inner">
                        <div class="item-title-row">
                          <div class="item-title">Play a Friend</div>
                          <div class="item-after">Unranked</div>
                        </div>
                        <div class="item-text">
                          Friendly match that does not affect rating. No rewards or player progression.
                        </div>
                      </div>
                    </a>
                  </li> -->

                `}

              </ul>
            </div>




            ${teamComponentService.inProgressGame?.game?._id ? $h`
                <div class="block-title block-title-medium">In Progress</div>
                <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                    <ul>
                      <${InProgress} vm=${teamComponentService.inProgressGame} />
                    </ul>
                </div>
            ` : $h` `}


            <${Roster} />


            ${teamComponentService.completedGames?.length > 0 ? $h`

                <div class="block-title block-title-medium">Recent Games</div>
                <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                    <ul>
                        ${teamComponentService.completedGames?.map(game => $h`
                            <${Result} game=${game} />
                        `)}
                    </ul>
                </div>

            ` : $h` `}

            <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                <ul>
                    <li>
                      <a href="${universeWebService.startDateLink(`/t/results/${vm.teamInfo.team._id}`)}" class="item-link item-content">
                        <div class="item-media">📅</div>
                        <div class="item-inner">
                          <div class="item-title-row">
                            <div class="item-title item-title-wrap">All Results</div>
                          </div>
                        </div>
                      </a>
                    </li>
                </ul>
            </div>

            ${vm.teamInfo.eventsViewModel?.transactions?.length > 0 ? $h`

                <div class="block-title block-title-medium">Activity</div>
                <${OffChainEvents} model="${vm.teamInfo.eventsViewModel}" />

            ` : $h` `}


            <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                <ul>
                    <li>
                      <a href="${universeWebService.startDateLink(`/t/activity/index/${vm.teamInfo.team._id}`)}" class="item-link item-content">
                        <div class="item-media">🔷</div>
                        <div class="item-inner">
                          <div class="item-title-row">
                            <div class="item-title item-title-wrap">Rewards & Player Moves</div>
                          </div>
                        </div>
                      </a>
                    </li>
                </ul>
            </div>

          </div>

          <${Footer} />

        ` : $h` `}

    </div>

    <div class="popup play-ranked-popup">
      <div class="view">
        <div class="page">

          <div class="navbar">
            <div class="navbar-bg"></div>
            <div class="navbar-inner">
              <div class="title">
                Play Ranked Game
              </div>
              <div class="right">
                <a class="link popup-close">Close</a>
              </div>
            </div>
          </div>

          <div class="page-content">

            <div class="block-title">You</div>

            <div class="list list-strong-ios list-outline-ios list-dividers-ios">
              <ul>
                <li>
                  <div class="item-content">
                    <div class="item-inner">
                      <div class="item-title">Rating</div>
                      <div class="item-after">
                        <strong>${myRating.toFixed(0)}</strong>
                      </div>
                    </div>
                  </div>
                </li>
              </ul>
            </div>


            <div class="block-title">Opponent</div>

            <div class="list list-strong-ios list-outline-ios list-dividers-ios">
              <ul>

                <li>
                  <div class="item-content">
                    <div class="item-inner">
                      <div class="item-title">Rating</div>
                      <div class="item-after">
                        <strong>${minOpponentRating.toFixed(0)}</strong> - <strong>${maxOpponentRating.toFixed(0)}</strong>
                      </div>
                    </div>
                  </div>
                </li>

                <li>
                  <div class="item-content">
                    <div class="item-inner">
                      <div class="item-input-wrap">
                        <div
                          class="range-slider range-slider-init"
                          data-label="true"
                          data-min="0"
                          data-max="250"
                          data-step="1"
                          data-scale="true"
                          data-value="${selectedMaxRatingDiff}"
                          @range:change="${rangeChange}">
                        </div>
                      </div>
                    </div>
                  </div>
                </li>

                <li>
                  <div class="item-content">
                    <div class="item-inner">
                      <div class="item-title">Minimum Reward</div>
                      <div class="item-after">
                        <strong>${universeWebService.displayDiamonds(projectedReward)}</strong>
                      </div>
                    </div>
                  </div>
                </li>

              </ul>
            </div>

            <div class="block">
              <a class="button button-fill button-large"
                @click="${confirmRankedQueueClick}">
                Join Ranked Queue
              </a>
            </div>

          </div>
        </div>
      </div>
    </div>


  </div>

</template>

<style>

</style>

<script>

  import { ContainerService } from "../../../service/container-service"
  import { UniverseWebService } from "../../service/universe-web-service.ts"
  import { TeamWebService } from "../../service/team-web-service.ts"
  import { GameWebService } from "../../service/game-web-service.ts"
  import { TeamComponentService } from "../../service/team-component-service.ts"
  import { StatService } from "../../../service/stat-service.ts"

  import InProgress from "./in-progress.f7.html"
  import Result from "./result.f7.html"
  import Roster from "../team/roster.f7.html"
  import Footer from "../common/footer.f7.html"
  import OffChainEvents from "../activity/offchain-events.f7.html"

  export default (props, { $, $h, $on, $f7, $update }) => {

    let eventTarget = ContainerService.getInstance("eventTarget")
    let leagues = ContainerService.getInstance("leagues")

    let universeWebService = ContainerService.getInstance(UniverseWebService)
    let teamWebService = ContainerService.getInstance(TeamWebService)
    let statService = ContainerService.getInstance(StatService)
    let gameWebService = ContainerService.getInstance(GameWebService)
    let teamComponentService = ContainerService.getInstance(TeamComponentService)

    let vm = props.vm
    let authInfo = props.authInfo


    let baseDiamondReward = leagues.find(l => l._id == authInfo.leagueId)?.baseDiamondReward

    let selectedMaxRatingDiff =  25
    let projectedReward = teamWebService.calculateProjectedReward(baseDiamondReward, selectedMaxRatingDiff) 

    let myRating = vm.teamInfo.team.longTermRating.rating
    let minOpponentRating = myRating - selectedMaxRatingDiff
    let maxOpponentRating = myRating + selectedMaxRatingDiff

    const rangeChange = (e) => {

      const range = $f7.range.get(e.target)

      selectedMaxRatingDiff = range.value

      minOpponentRating = myRating - selectedMaxRatingDiff
      maxOpponentRating = myRating + selectedMaxRatingDiff

      projectedReward = teamWebService.calculateProjectedReward(
        baseDiamondReward,
        selectedMaxRatingDiff
      )

      $update()

    }

    const saveClick = (e) => {
      $f7.emit('save-roster-click', e)
    }

    const clickLeaveQueue = async (e) => {

      e.preventDefault()

      $f7.dialog.confirm("Are you sure you want to leave the queue?", async () => {

        $f7.preloader.show()

        try {
          await gameWebService.dequeue()
          $f7.views.main.router.refreshPage()
        } catch (ex) {
          $f7.dialog.alert(ex.message, "There was an error")
        }

        $f7.preloader.hide()

      })

    }


    const openJoinRankedQueuePopup = async (e) => {

      e.preventDefault()

      $f7.popup.open('.play-ranked-popup')

    }




    const confirmRankedQueueClick = async (e) => {

      e.preventDefault()

      try {
        await gameWebService.queue(selectedMaxRatingDiff)
        $f7.popup.close('.play-ranked-popup')
        $f7.views.main.router.refreshPage()
      } catch (ex) {
        $f7.dialog.alert(ex?.response?.data)
      }

    }

    const clickPlayBot = async (e) => {
      e.preventDefault()
      $f7.dialog.alert("Not implemented yet.")
    }

    const clickChallengeFriend = async (e) => {
      e.preventDefault()
      $f7.dialog.alert("Not implemented yet.")
    }

    const clamp = (n, min, max) => Math.min(Math.max(n, min), max)

    const getTeamDayNumber = (season) =>
      clamp(season.team.gamesPlayed + 1, 1, season.totalDays)

    const getDaysAhead = (season) =>
      Math.max(getTeamDayNumber(season) - season.dayNumber, 0)

    const getAvailableQueueCount = (season) =>
      Math.max(season.dayNumber - season.team.gamesPlayed, 0)

    const isSeasonComplete = (season) => season.dayNumber >= season.totalDays
    const isAhead = (season) => getDaysAhead(season) > 0

    const isCaughtUp = (season) =>
      getAvailableQueueCount(season) <= 0

    const getQueuedSubtitle = (season) => {

      if (isCaughtUp(season)) {
        return `You’re queued for your next game.`
      }

      return `You’re queued for ranked matchmaking.`
    }

    const onGameUpdate = async (game) => {

      teamComponentService.updateInProgressGame(game)

      if (game.isComplete) {
        gameWebService.unwatchGame(game._id)
        $f7.views.main.router.refreshPage()
      }

      await $update()

    }

    const refreshPage = () => {
      $f7.views.main.router.refreshPage()
    }

    $on('pageBeforeIn', async () => {

      $f7.off('roster-refresh-lineup')
      $f7.on('roster-refresh-lineup', () => {
        $update()
      })

      if (teamComponentService.inProgressGame?.game._id) {
        gameWebService.watchGame(teamComponentService.inProgressGame?.game._id, onGameUpdate)
      }

      eventTarget.dispatchEvent(new CustomEvent('main-nav', {
        detail: {
          visible: false,
          tabLink: "/"
        }
      }))

      await $update()

    })

    $on('pageBeforeOut', async () => {
      if (teamComponentService.inProgressGame?.game?._id) {
        gameWebService.unwatchGame(teamComponentService.inProgressGame?.game?._id, onGameUpdate)
      }
    })

    return $render
  }
</script>
