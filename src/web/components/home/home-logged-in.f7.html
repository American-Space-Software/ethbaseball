        .format('YYYY-MM-DD')

      queueDateAsLocalDayStr(season) === localTodayStr()

      queueDateAsLocalDayStr(season) === localTomorrowStr()

      const nowEt = dayjs().tz('America/New_York')
      const start = nowEt.clone().hour(13).minute(0).second(0)
      const end = nowEt.clone().hour(15).minute(0).second(0)
      return nowEt.isAfter(start) && nowEt.isBefore(end)
    }

      const startTimeUtc = dayjs.tz(`${startDay} 13:00`, 'America/New_York').utc()
      const endTimeUtc = dayjs.utc(`${startDay} 00:00`).add(1, 'day') // midnight UTC of next day
      return nowUtc.isAfter(startTimeUtc) && nowUtc.isBefore(endTimeUtc)
    }

    const isGamesWrappingUp = (season) => {
      // last ~2 hours of the UTC day
      const nowUtc = dayjs.utc()
      const startDay = dayjs(season.universeDate).format('YYYY-MM-DD')
      const endTimeUtc = dayjs.utc(`${startDay} 00:00`).add(1, 'day')
      const wrapUtc = endTimeUtc.subtract(2, 'hour')
      return nowUtc.isAfter(wrapUtc) && nowUtc.isBefore(endTimeUtc)
