<template es>

  <div class="page" data-name="home">


    <div class="page-content">

        <div class="fixed-width-content center">

          <div class="block-title block-title-medium">Your Team</div>
          <div class="list media-list list-outline-ios list-strong">
            <ul>

              <li>
                <a class="item-link item-content" href="/t/index/${vm.team._id}">
                  <div class="item-media">
                    <img src="/image/thumbnail/100/${vm.team.logoId}" width="56" height="56" style="border-radius: 12px;" />
                  </div>

                  <div class="item-inner">
                    <div class="item-title-row">
                      <div class="item-title">${teamWebService.getTeamName(vm.team)}</div>
                      <div class="item-after">⭐ ${vm.team.longTermRating.rating.toFixed(0)}</div>
                    </div>

                    <div class="item-subtitle">
                      ${vm.team.overallRecord.wins}-${vm.team.overallRecord.losses}
                      <span class="separator">|</span>
                      ${statService.formatRatio(vm.team.overallRecord.winPercent)}
                    </div>

                    <div class="item-text">
                      Cash: ${universeWebService.displayDiamonds(vm.team.diamondBalance)}
                    </div>
                  </div>
                </a>
              </li>

            </ul>
          </div>

          <div class="block-title block-title-medium">Current Season</div>
          <div class="block block-outline block-strong season-info-card">

            <div class="season-info-range">
              ${dayjs(vm.season.startDate).format('MMM D, YYYY')} → ${dayjs(vm.season.endDate).format('MMM D, YYYY')}
            </div>

            <div class="row season-info-stats">
              <div class="col">
                <div class="season-info-day">
                  Day ${vm.season.dayNumber} of ${vm.season.totalDays}
                </div>

                ${isSeasonComplete(vm.season) ? $h`
                  <div class="season-info-complete">Season complete</div>
                ` : $h`
                  <div class="season-info-remaining">
                    ${vm.season.daysRemaining} days remaining
                  </div>
                `}

                <div class="season-info-games">
                  Games played: ${vm.season.team.gamesPlayed}
                </div>
              </div>

              <div class="col text-align-right">
                ${shouldShowJoinQueue(vm.season) ? $h`
                  <div class="season-info-current-label">Queue for</div>
                  <div class="season-info-queue-date">
                    ${dayjs(vm.season.nextQueueDate).format('MMM D, YYYY')}
                  </div>
                ` : $h``}
              </div>
            </div>

            <div class="season-info-timeline">
              <div class="progressbar" data-progress="${getSeasonPercent(vm.season)}">
                <span></span>
              </div>

              ${shouldShowCatchUp(vm.season) ? $h`
                <div class="season-info-markers">
                  <div
                    class="season-info-marker season-info-marker--you
                      ${isYouAtStart(vm.season) ? 'season-info-marker--start' : ''}
                      ${isYouAtEnd(vm.season) ? 'season-info-marker--end' : ''}"
                    style="left: ${getYouLeftPercent(vm.season)}%;"
                  >
                    <span class="season-info-marker-line"></span>
                    <span class="season-info-marker-text">You</span>
                  </div>
                </div>
              ` : $h``}
            </div>

            <div class="block-footer season-info-status">
              ${isSeasonComplete(vm.season) ? $h`
                <span class="season-info-status-strong">Status:</span>
                <span>Season complete</span>
              ` : isBehind(vm.season) ? $h`
                <span class="season-info-status-strong">Status:</span>
                <span>
                  Behind by ${getDaysBehind(vm.season)} day${getDaysBehind(vm.season) === 1 ? '' : 's'}
                </span>
              ` : isAhead(vm.season) ? $h`
                <span class="season-info-status-strong">Status:</span>
                <span class="season-info-status-ahead">
                  Ahead by ${getDaysAhead(vm.season)} day${getDaysAhead(vm.season) === 1 ? '' : 's'} (too far ahead)
                </span>
              ` : $h`
                <span class="season-info-status-strong">Status:</span>
                <span>Up to date</span>
              `}
            </div>

            ${!isSeasonComplete(vm.season) && shouldShowCatchUp(vm.season) && isQueueClosedForUniverseDay(vm.season) ? $h`
              <div class="season-info-callout">
                <div class="season-info-callout-title">Queue is closed for today</div>
                <div class="season-info-callout-body">
                  Catch up first. Once you’re up to date, you can join the queue for tomorrow.
                </div>
              </div>
            ` : $h``}

            ${!isSeasonComplete(vm.season) && shouldShowJoinQueue(vm.season) && isQueueClosedForUniverseDay(vm.season) ? $h`
              <div class="season-info-callout">
                <div class="season-info-callout-title">Today’s queue is closed</div>

                ${isGamesUnderway(vm.season) ? $h`
                  <div class="season-info-callout-body">
                    Games for <b>${dayjs(vm.season.universeDate).format('MMM D')}</b> are underway.
                    You can join the queue for tomorrow.
                  </div>
                ` : isGamesWrappingUp(vm.season) ? $h`
                  <div class="season-info-callout-body">
                    Games for <b>${dayjs(vm.season.universeDate).format('MMM D')}</b> are wrapping up.
                    You can join the queue for tomorrow.
                  </div>
                ` : $h`
                  <div class="season-info-callout-body">
                    You can join the queue for tomorrow.
                  </div>
                `}
              </div>
            ` : $h``}

          </div>

          <div class="list list-outline-ios list-strong-ios list-dividers-ios">
            <ul>

              <li>
                <a class="item-link item-content" href="/t/index/${vm.team._id}">
                  <div class="item-inner">
                    <div class="item-title">👥 Manage Team</div>
                  </div>
                </a>
              </li>

              ${!isSeasonComplete(vm.season) && shouldShowCatchUp(vm.season) ? $h`
                <li>
                  <a class="item-link item-content" href="/s/catchup/${vm.season._id}">
                    <div class="item-inner">
                      <div class="item-title">⏩ Catch Up</div>
                    </div>
                  </a>
                </li>
              ` : !isSeasonComplete(vm.season) && shouldShowJoinQueue(vm.season) ? $h`
                <li>
                  <a class="item-link item-content" href="/q/join/${vm.season._id}">
                    <div class="item-inner">
                      <div class="item-title">
                        ${isNextQueueToday(vm.season) ? '🏟️ Join Queue for Today'
                          : isNextQueueTomorrow(vm.season) ? '🏟️ Join Queue for Tomorrow'
                          : `🏟️ Join Queue for ${dayjs(vm.season.nextQueueDate).format('MMM D')}`}
                      </div>
                    </div>
                  </a>
                </li>

                <li class="item-content">
                  <div class="item-inner">
                    <div class="item-subtitle">
                      ${getQueueSubtitle(vm.season)}
                    </div>
                  </div>
                </li>
              ` : $h``}

            </ul>
          </div>



          ${inProgressGame?.game?._id ? $h`
              <div class="block-title block-title-medium">In Progress</div>
              <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                  <ul>
                    <${InProgress} vm=${inProgressGame} />
                  </ul>
              </div>
          ` : $h` `}


          <div class="block-title block-title-medium">Daily Rewards & Transactions</div>
          ${vm.offChainEvents?.events?.length > 0 ? $h`

            <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                <ul>

                  ${vm.offChainEvents.events.map( oce => $h`
                    <li>
                      <div class="item-content">
                          <div class="item-media">
                              🔷
                          </div>
                          <div class="item-inner">

                              <div class="item-title">
                                ${getOffChainDescription(oce)}
                                <div class="item-footer">${dayjs(oce.dateCreated).format("ddd, MMM D, YYYY h:mm A")}</div>
                              </div>

                              <div class="item-after">
                                  ${getOffChainAmount(oce)}
                              </div>
                          </div>
                      </div>
                    </li>                          
                  `)}

                </ul>
            </div>

          ` : $h`
            <div class="block block-outline block-strong">
              No rewards yet. Play at least one game each day to earn rewards.
            </div>          
          `}



          ${vm?.completedGames?.length > 0 ? $h`

              <div class="block-title block-title-medium">Recent Games</div>
              <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                  <ul>
      
                      ${vm?.completedGames?.map( game => $h`
                          <${Result} game=${game} />                      
                      `)}
      
                  </ul>
      
              </div>

          ` : $h` `}
              
        </div>

 

        <${Footer} />

    </div>

  </div>

</template>

<style>

</style>

<script>

  import main from "../../html/images/main.png"

  import Navbar from "../common/navbar.f7.html"
  import Breadcrumbs from "../common/breadcrumbs.f7.html"
  import Footer from "../common/footer.f7.html"
  import Toolbar from "../common/toolbar.f7.html"


  import GameTransactions from "../activity/game-transaction-events.f7.html"
  import OnChainEvents from "../activity/onchain-events.f7.html"
  import OffChainEvents from "../activity/offchain-events.f7.html"


  import { ContainerService } from "../../../service/container-service"
  import { UniverseWebService } from "../../service/universe-web-service.ts"
  import { TeamWebService } from "../../service/team-web-service.ts"
  import { GameWebService } from "../../service/game-web-service.ts"

  import { StatService } from "../../../service/stat-service.ts"
  import { Position } from "../../../service/enums.ts"
  import { OffChainEventWebService } from "../../service/off-chain-event-web-service.ts"

  import dayjs from "dayjs"


  import InProgress from "./in-progress.f7.html"
  import Scheduled from "./scheduled.f7.html"
  import Result from "./result.f7.html"

  import gameShot from "../../html/images/screenshots/game.png"
  import logo from "../../html/images/logo.png"


  export default (props, { $, $h, $on, $f7, $update }) => {

    let env = ContainerService.getInstance("env")()
    let eventTarget = ContainerService.getInstance("eventTarget")
    let universeWebService = ContainerService.getInstance(UniverseWebService)
    let walletService = ContainerService.getInstance("WalletService")
    let teamWebService = ContainerService.getInstance(TeamWebService)
    let statService = ContainerService.getInstance(StatService)
    let gameWebService = ContainerService.getInstance(GameWebService)
    let offChainEventWebService = ContainerService.getInstance(OffChainEventWebService)

    let authInfo = props.authInfo
    let vm = props.vm
    let contractBalance = props.contractBalance
    let discord = props.discord 
    
    let inProgressGame = props.inProgressGame

    console.log(vm)



    const clamp = (n, min, max) => Math.min(Math.max(n, min), max)

    const asDay = (d) => dayjs(d).format('YYYY-MM-DD')
    const sameDay = (a, b) => asDay(a) === asDay(b)

    const getSeasonPercent = (season) =>
      clamp(Math.round((season.dayNumber / season.totalDays) * 100), 0, 100)

    // IMPORTANT: when you're "up to date", you must have finished the league's current day.
    // That means gamesPlayed should be >= season.dayNumber (not +1).
    const getTeamDayNumber = (season) =>
      clamp(season.team.gamesPlayed + 1, 1, season.totalDays)

    const getDaysBehind = (season) =>
      Math.max(season.dayNumber - getTeamDayNumber(season), 0)

    const getDaysAhead = (season) =>
      Math.max(getTeamDayNumber(season) - season.dayNumber, 0)

    const isSeasonComplete = (season) => season.dayNumber >= season.totalDays

    const isBehind = (season) => getDaysBehind(season) > 0
    const isAhead  = (season) => getDaysAhead(season) > 0

    const isYouAtStart = (season) => getTeamDayNumber(season) <= 1
    const isYouAtEnd   = (season) => getTeamDayNumber(season) >= season.totalDays

    const getYouLeftPercent = (season) =>
      clamp(((getTeamDayNumber(season) - 1) / (season.totalDays - 1)) * 100, 0, 100)

    // queue/day model helpers
    const isQueueClosedForUniverseDay = (season) =>
      !sameDay(season.nextQueueDate, season.universeDate)

    const isNextQueueToday = (season) =>
      sameDay(season.nextQueueDate, season.universeDate)

    const isNextQueueTomorrow = (season) =>
      sameDay(season.nextQueueDate, dayjs(season.universeDate).add(1, 'day'))


    const needsCatchUpToQueue = (season) =>
      season.team.gamesPlayed < (season.dayNumber - 1)

    const shouldShowCatchUp = (season) =>
      !isSeasonComplete(season) &&
      !isAhead(season) &&
      (isBehind(season) || needsCatchUpToQueue(season))

    const shouldShowJoinQueue = (season) =>
      !isSeasonComplete(season) &&
      !isAhead(season) &&
      !shouldShowCatchUp(season)

    // callout timing (purely client-side messaging)
    const getQueueDeadlineEt = (season) =>
      dayjs.tz(`${season.universeDate} 13:00`, 'America/New_York')

    const getTimeLeftToQueue = (season) =>
      dayjs().to(getQueueDeadlineEt(season))

    const isGamesUnderway = (season) => {
      // after 1PM ET, before midnight UTC
      const nowUtc = dayjs.utc()
      const startDay = dayjs(season.universeDate).format('YYYY-MM-DD')
      const startTimeUtc = dayjs.tz(`${startDay} 13:00`, 'America/New_York').utc()
      const endTimeUtc = dayjs.utc(`${startDay} 00:00`).add(1, 'day') // midnight UTC of next day
      return nowUtc.isAfter(startTimeUtc) && nowUtc.isBefore(endTimeUtc)
    }

    const isGamesWrappingUp = (season) => {
      // last ~2 hours of the UTC day
      const nowUtc = dayjs.utc()
      const startDay = dayjs(season.universeDate).format('YYYY-MM-DD')
      const endTimeUtc = dayjs.utc(`${startDay} 00:00`).add(1, 'day')
      const wrapUtc = endTimeUtc.subtract(2, 'hour')
      return nowUtc.isAfter(wrapUtc) && nowUtc.isBefore(endTimeUtc)
    }

    // subtitle under the join link
    const getQueueSubtitle = (season) => {
      if (isQueueClosedForUniverseDay(season)) {
        return `✅ Today’s queue is closed`
      }
      return `⏰ Queue closes at 1:00 PM ET (${getTimeLeftToQueue(season)})`
    }








    const getOffChainDescription = (oce) => {
        return offChainEventWebService.getOffChainDescription(oce)
    }

    const getOffChainAmount = (oce) => {
        if (oce.event == "Transfer") {
            if (oce.toAddress == "0x0000000000000000000000000000000000000000") return `-${universeWebService.displayDiamonds(oce.amount)}`
            if (oce.fromAddress == "0x0000000000000000000000000000000000000000") return universeWebService.displayDiamonds(oce.amount)
        }
    }

    const createLineupPopup = (lineup, confirmLineup) => {

          const rows = (lineup.lineup || []).map((p, index) => `
        <tr>
          <td>${index + 1}</td>
          <td class="image">
            <img src="/player/image/${p._id}" width="35" height="35" />
          </td>
          <td class="name">
              <a href="${universeWebService.startDateLink(`/p/${p._id}`)}" class="popup-close">${p.fullName}</a><br />
              <span class="position">${p.primaryPosition}</span>

              ${p.stamina < 1 && p.primaryPosition == Position.PITCHER ? `
              Pitcher is tired.
              ` : ` `}

          </td>
          <td class="numeric-cell">

            ${p.primaryPosition == Position.PITCHER ? `
              <div class="stamina-bar ${p.stamina === 1 ? 'green' : p.stamina >= 0.5 ? 'yellow' : 'red'}"
                  data-pct="${(p.stamina * 100).toFixed(0)}">
                <div class="gap">
                  <span class="label">${(p.stamina * 100).toFixed(0)}</span>
                </div>
                <div class="fill" style="height:${(p.stamina * 100).toFixed(0)}%;">
                  <span class="label">${(p.stamina * 100).toFixed(0)}</span>
                </div>
              </div>
            ` : ` `}

          </td>
        </tr>
      `).join("")

          const popup = $f7.popup.create({
            content: `
          <div class="popup confirm-lineup-popup">
            <div class="page">
              <div class="navbar">
                <div class="navbar-bg"></div>
                <div class="navbar-inner">
                  <div class="title">Confirm Lineup</div>
                  <div class="right">
                    <a class="link popup-close">Close</a>
                  </div>
                </div>
              </div>

              <div class="page-content">
                <div class="stat-table-wrapper">
                  <table class="data-table players confirm-lineup">
                    <thead>
                      <tr>
                        <th>Order</th>
                        <th class="image"></th>
                        <th class="name">Name</th>
                      </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                  </table>
                </div>

                <div class="block split-row-both" style="margin-top: 5px;">
                  <div>
                    <a class="button button-outline color-gray popup-close" href="/t/index/${vm.team._id}">Edit Lineup</a>
                  </div>
                  <div>
                    <a class="button button-fill confirm-lineup-btn">Confirm</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `,

            on: {
              opened(p) {
                // p.el is the popup root element
                const btn = p.el.querySelector(".confirm-lineup-btn")
                if (!btn) return

                // attach once
                btn.addEventListener("click", (e) => {
                  e.preventDefault()
                  confirmLineup?.(lineup)
                  p.close()
                }, { once: true })
              },

              closed(p) {
                p.destroy()
              }
            }
          })

          popup.open()
        }

    const playBotClick = async (e) => {

      e.preventDefault()

      $f7.preloader.show()

      try {
        
        let lineup = await teamWebService.getActiveLineup(vm.team._id)
        
        createLineupPopup(lineup, async () => {
          
          let gameInfo = await gameWebService.playBot()

          if (gameInfo.gameId) {
            $f7.views.main.router.navigate(`/g/${gameInfo.gameId}`, { reloadCurrent: true })
          }

        })
      
      } catch(ex) { 

        if (ex.response.data) {
          $f7.dialog.alert(ex.response.data, "Lineup Error")
        } else {
          $f7.dialog.alert(ex.message, "There was an error")
        }
        
      }

      $f7.preloader.hide()

      
    }

    const onGameUpdate = async (game) => {

      Object.assign(inProgressGame, gameWebService.getGameViewModel(game))

      if (game.isComplete) {
        gameWebService.unwatchGame(inProgressGame.game._id)
        $f7.views.main.router.refreshPage()
      }

      await $update()

    }

    $on('pageBeforeIn', async (e) => {

      //Start watching game if in progress
      if (inProgressGame?.game?._id) {
        gameWebService.watchGame(inProgressGame.game._id, onGameUpdate)
      }

      eventTarget.dispatchEvent(new CustomEvent('main-nav', {
          detail: {
            visible: false,
            tabLink: "/",
            breadcrumbs: [{ text: "Home", path: "/" }, { text: walletService.truncateEthAddress(vm?.authInfo?.address)}]
          }
      }))

      universeWebService.setMetadata(
              `Ethereum Baseball League - Step Into the Owner’s Box. The League Awaits.`, 
              window.location.href, 
              `${env.WEB}/logo.png`, 
              "Ethereum Baseball League (EBL) is a competitive PvP sports ownership and business simulator. Build a winning team, manage your finances, and outmaneuver real opponents in a player-driven economy where teams and Diamonds are bought, sold, and earned. "
      ) 


      await $update()

    })

    $on('pageBeforeOut', async () => {
      if (inProgressGame?.game?._id) {
        gameWebService.unwatchGame(inProgressGame.game._id, onGameUpdate)
      }
    })

    return $render
  }
</script>
