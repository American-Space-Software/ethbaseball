<template es>

  <div class="page" data-name="home">


    <div class="page-content">

        <div class="fixed-width-content center">

          <div class="block">

              <a class="link" href="/t/index/${vm.team._id}">

                <div class="team-info">

                    <div class="left">
                        <img src="/image/thumbnail/100/${vm.team.logoId}" class="profilePic" height="100" width="100" />
                    </div>

                    <div class="right">

                        <span class="name">${teamWebService.getTeamName(vm.team)}</span> 

                        <div class="team-record">
                            <!-- <span class="label">Ranked: </span> ${ vm.team.overallRecord.rank } <br /> -->
                            <span class="label">Record: </span> ${vm.team.overallRecord.wins}-${vm.team.overallRecord.losses} <span class="separator">|</span> ${statService.formatRatio(vm.team.overallRecord.winPercent)}<br />
                            <span class="label">Cash: </span> ${universeWebService.displayDiamonds(vm.team.diamondBalance)}<br /><br />
                        </div>
                        
                    </div>

                </div>

              </a>
          </div>

          <div class="list links-list list-inset list-outline-ios list-dividers-ios list-strong">
              <ul>
                  <li><a class="link" href="/t/index/${vm.team._id}">👥 Manage Team</a></li>

                  ${!inProgressGame ? $h`
                    <li><a class="link popup-open" data-popup=".play-popup">🏆 Play</a></li>
                  ` : $h` `}

              </ul>
          </div>


          ${inProgressGame ? $h`
              <div class="block-title block-title-small">In Progress</div>
              <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                  <ul>
                    <${InProgress} game=${inProgressGame} />
                  </ul>
              </div>
          ` : $h` `}


          <div class="block-title block-title-small">Daily Rewards & Transactions</div>
          ${vm.offChainEvents?.events?.length > 0 ? $h`

            <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                <ul>

                  ${vm.offChainEvents.events.map( oce => $h`
                    <li>
                      <div class="item-content">
                          <div class="item-media">
                              🔷
                          </div>
                          <div class="item-inner">

                              <div class="item-title">
                                ${getOffChainDescription(oce)}
                                <div class="item-footer">${dayjs(oce.dateCreated).format("ddd, MMM D, YYYY h:mm A")}</div>
                              </div>

                              <div class="item-after">
                                  ${getOffChainAmount(oce)}
                              </div>
                          </div>
                      </div>
                    </li>                          
                  `)}

                </ul>
            </div>

          ` : $h`
            <div class="block block-outline block-strong">
              No rewards yet. Play at least one game each day to earn rewards.
            </div>          
          `}



          ${completedGames?.length > 0 ? $h`

              <div class="block-title block-title-small">Recent Games</div>
              <div class="list list-outline-ios list-strong-ios list-dividers-ios">
                  <ul>
      
                      ${completedGames.map( game => $h`
                          <${Result} game=${game} />                      
                      `)}
      
                  </ul>
      
              </div>

          ` : $h` `}
              
        </div>

        
        <div class="popup play-popup">
          <div class="view">
            <div class="page">
              <div class="navbar">
                <div class="navbar-bg"></div>
                <div class="navbar-inner">
                  <div class="title">
                    Play a Game
                  </div>
                  <div class="right">
                    <!-- Link to close popup -->
                    <a class="link popup-close">Close</a>
                  </div>
                </div>
              </div>
              <div class="page-content">

                <div class="list links-list list-outline list-strong">
                  <ul>
                    <li>
                      <li><a class="link popup-close" @click="${playBotClick}">🤖 Play Bot</a></li>
                      <li><a class="link" href="/t/index/${vm.team._id}">🏆 Enter PvP Queue</a></li>                        
                    </li>
                  </ul>
                </div>

              </div>
            </div>
          </div>
        </div>

        <${Footer} />

    </div>

  </div>

</template>

<style>

</style>

<script>

  import main from "../../html/images/main.png"

  import Navbar from "../common/navbar.f7.html"
  import Breadcrumbs from "../common/breadcrumbs.f7.html"
  import Footer from "../common/footer.f7.html"

  import Toolbar from "../common/toolbar.f7.html"

  import GameTransactions from "../activity/game-transaction-events.f7.html"
  import OnChainEvents from "../activity/onchain-events.f7.html"
  import OffChainEvents from "../activity/offchain-events.f7.html"


  import { ContainerService } from "../../../service/container-service"
  import { UniverseWebService } from "../../service/universe-web-service.ts"
  import { TeamWebService } from "../../service/team-web-service.ts"
  import { GameWebService } from "../../service/game-web-service.ts"

  import { StatService } from "../../../service/stat-service.ts"
  import { Position } from "../../../service/enums.ts"
  import { OffChainEventWebService } from "../../service/off-chain-event-web-service.ts"

  import dayjs from "dayjs"


  import InProgress from "./in-progress.f7.html"
  import Scheduled from "./scheduled.f7.html"
  import Result from "./result.f7.html"

  import gameShot from "../../html/images/screenshots/game.png"
  import logo from "../../html/images/logo.png"


  export default (props, { $, $h, $on, $f7, $update }) => {

    let env = ContainerService.getInstance("env")()
    let eventTarget = ContainerService.getInstance("eventTarget")
    let universeWebService = ContainerService.getInstance(UniverseWebService)
    let walletService = ContainerService.getInstance("WalletService")
    let teamWebService = ContainerService.getInstance(TeamWebService)
    let statService = ContainerService.getInstance(StatService)
    let gameWebService = ContainerService.getInstance(GameWebService)
    let offChainEventWebService = ContainerService.getInstance(OffChainEventWebService)

    let authInfo = props.authInfo
    let vm = props.vm
    let contractBalance = props.contractBalance
    let discord = props.discord 
    
    let completedGames = props.completedGames
    let inProgressGame = props.inProgressGame

    const getOffChainDescription = (oce) => {
        return offChainEventWebService.getOffChainDescription(oce)
    }

    const getOffChainAmount = (oce) => {
        if (oce.event == "Transfer") {
            if (oce.toAddress == "0x0000000000000000000000000000000000000000") return `-${universeWebService.displayDiamonds(oce.amount)}`
            if (oce.fromAddress == "0x0000000000000000000000000000000000000000") return universeWebService.displayDiamonds(oce.amount)
        }
    }

    const createLineupPopup = (lineup, confirmLineup) => {
          const rows = (lineup.lineup || []).map((p, index) => `
        <tr>
          <td>${index + 1}</td>
          <td class="image">
            ${p?._id ? `<img src="/player/image/${p._id}" width="35" height="35" />` : ``}
          </td>
          <td class="name">
            ${p?._id ? `
              <a href="${universeWebService.startDateLink(`/p/${p._id}`)}" class="popup-close">${p.fullName}</a><br />
              <span class="position">${p.primaryPosition}</span>
            ` : ``}
          </td>
        </tr>
      `).join("")

          const popup = $f7.popup.create({
            content: `
          <div class="popup confirm-lineup-popup">
            <div class="page">
              <div class="navbar">
                <div class="navbar-bg"></div>
                <div class="navbar-inner">
                  <div class="title">Confirm Lineup</div>
                  <div class="right">
                    <a class="link popup-close">Close</a>
                  </div>
                </div>
              </div>

              <div class="page-content">
                <div class="stat-table-wrapper">
                  <table class="data-table players confirm-lineup">
                    <thead>
                      <tr>
                        <th>Order</th>
                        <th class="image"></th>
                        <th class="name">Name</th>
                      </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                  </table>
                </div>

                <div class="block split-row-both" style="margin-top: 5px;">
                  <div>
                    <a class="button button-outline color-gray popup-close" href="/t/index/${vm.team._id}">Edit Lineup</a>
                  </div>
                  <div>
                    <a class="button button-fill confirm-lineup-btn">Confirm</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `,

            on: {
              opened(p) {
                // p.el is the popup root element
                const btn = p.el.querySelector(".confirm-lineup-btn")
                if (!btn) return

                // attach once
                btn.addEventListener("click", (e) => {
                  e.preventDefault()
                  confirmLineup?.(lineup)
                  p.close()
                }, { once: true })
              },

              closed(p) {
                p.destroy()
              }
            }
          })

          popup.open()
        }



    const playBotClick = async (e) => {

      e.preventDefault()

      $f7.preloader.show()

      try {
        
        let lineup = await teamWebService.getActiveLineup(vm.team._id)
        
        createLineupPopup(lineup, async () => {
          
          let gameInfo = await gameWebService.playBot()

          if (gameInfo.gameId) {
            $f7.views.main.router.navigate(`/g/${gameInfo.gameId}`, { reloadCurrent: true })
          }

        })
      
      } catch(ex) { 

        if (ex.response.data) {
          $f7.dialog.alert(ex.response.data, "Lineup Error")
        } else {
          $f7.dialog.alert(ex.message, "There was an error")
        }
        
      }

      $f7.preloader.hide()

      
    }

    $on('pageBeforeIn', async (e) => {

      //Start watching game
      // gameWebService.watchGame(gameViewModel.game._id, onGameUpdate)

      eventTarget.dispatchEvent(new CustomEvent('main-nav', {
          detail: {
            visible: false,
            tabLink: "/",
            breadcrumbs: [{ text: "Home", path: "/" }, { text: walletService.truncateEthAddress(vm?.authInfo?.address)}]
          }
      }))

      universeWebService.setMetadata(
              `Ethereum Baseball League - Step Into the Owner’s Box. The League Awaits.`, 
              window.location.href, 
              `${env.WEB}/logo.png`, 
              "Ethereum Baseball League (EBL) is a competitive PvP sports ownership and business simulator. Build a winning team, manage your finances, and outmaneuver real opponents in a player-driven economy where teams and Diamonds are bought, sold, and earned. "
      ) 


      await $update()


      // $('.hide-on-pageinit').hide()
      // $('.hidden-on-load').show()


    })

    $on('pageBeforeOut', async () => {
      // gameWebService.unwatchGame(gameViewModel.game._id)
    })

    return $render
  }
</script>
