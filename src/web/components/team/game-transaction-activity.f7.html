    <div class="page-content">

        <div class="hidden-on-load">

            <div class="block">

                    <a href="${universeWebService.fullLink(`/t/activity/${tokenId}`)}" class="button button-outline tab-link" >On-chain</a>

            <div class="block split-row-both">
              <div>
                  ${previousPage ? $h`

                  ` : $h` `}
              </div>
              <div>
                  ${nextPage ? $h`
                  <a data-reload-current="true" data-force="true" data-browser-history="true" href="/t/activity/${tokenId}?page=${nextPage}&startDate=${universeWebService.getStartDate()}&rank=${universeWebService.getRank()}" class="button button-fill">Next</a>
                  ` : $h` `}

<script>


  import Navbar from "../common/navbar.f7.html"

  import dayjs from "dayjs"
  import { ContainerService } from "../../../service/container-service.ts"

  import { UniverseWebService } from "../../service/universe-web-service.ts"

  import { Position } from "../../../service/enums.ts"

  // import OffChainEvents from "../activity/offchain-events.f7.html"
  // import OnChainEvents from "../activity/onchain-events.f7.html"
  import GameTransactions from "../activity/game-transaction-events.f7.html"

  export default (props, { $on, $, $f7, $update }) => {

    let universeWebService = ContainerService.getInstance(UniverseWebService)

    let tokenId 

    let model = {}
    let page = 1

    let previousPage 
    let nextPage



    $on('pageInit', async (e) => {
        await $update()
    })


    $on('pageReinit', async () => {
    })


    $on('pageBeforeIn', async () => {

      model = props.model
      tokenId = props.tokenId
      page = props.page
      previousPage = props.previousPage
      nextPage = props.nextPage

      await $update()

      $('.hide-on-pageinit').hide()
      $('.hidden-on-load').show()


    })


    return $render

  }
</script>
