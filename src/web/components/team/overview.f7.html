<script>


    import Navbar from "../common/navbar.f7.html"

    import dayjs from "dayjs"

    import { ContainerService } from "../../../service/container-service.ts"
    import { OwnerWebService } from "../../service/owner-web-service.ts"
    import { PlayerWebService } from "../../service/player-web-service.ts"
    import { TransactionWebService } from "../../service/transaction-web-service.ts"
    import { StatService } from "../../../service/stat-service.ts"
    import { PagingService } from "../../../service/paging-service.ts"
    import { LoginWebService } from "../../service/login-web-service.ts"
    import { TeamWebService } from "../../service/team-web-service.ts"
    import { Position } from "../../../service/enums.ts"
    import { TeamComponentService } from "../../service/team-component-service.ts"
    import { UniverseWebService } from "../../service/universe-web-service.ts"

    import InProgress from "../game/in-progress.f7.html"
    import Scheduled from "../game/scheduled.f7.html"
    import Result from "../game/result.f7.html"

    export default (props, { $on, $, $f7, $update, $onMounted }) => {

        let eventTarget = ContainerService.getInstance("eventTarget")
        let ownerWebService = ContainerService.getInstance(OwnerWebService)
        let walletService = ContainerService.getInstance("WalletService")
        let playerWebService = ContainerService.getInstance(PlayerWebService)
        let transactionWebService = ContainerService.getInstance(TransactionWebService)
        let statService = ContainerService.getInstance(StatService)
        let pagingService = ContainerService.getInstance(PagingService)
        let loginWebService = ContainerService.getInstance(LoginWebService)
        let teamWebService = ContainerService.getInstance(TeamWebService)
        let teamComponentService = ContainerService.getInstance(TeamComponentService)
        let universeWebService = ContainerService.getInstance(UniverseWebService)

        const MAX_ROSTER_SIZE = 13


        let loading
        let authInfo



        const mintPassClick = async (e) => {

            try {

                //Get signed mint pass
                let mintPass = teamComponentService.team.diamondMintPasses.find(mp => mp._id == $(e.target).data('id'))

                let result = await diamondWebService.withdraw(mintPass)

                if (result.hash) {
                    $f7.views.main.router.navigate($f7.views.main.router.currentRoute.url, { reloadCurrent: true, ignoreCache: true })
                }

            } catch (ex) {
                $f7.dialog.alert(ex.reason, "There was an error")
                console.log(ex)
            }


        }

        const withdrawClick = async (e) => {

            try {

                let mintInfo = await teamWebService.withdraw(teamComponentService.team.tokenId)

                let result = await diamondService.withdraw(mintInfo.to, mintInfo._id, mintInfo.amount, mintInfo.tokenId, mintInfo.expires, mintInfo.v, mintInfo.r, mintInfo.s)

                if (result.hash) {
                    $f7.views.main.router.navigate($f7.views.main.router.currentRoute.url, { reloadCurrent: true, ignoreCache: true })
                }

            } catch (ex) {
                $f7.dialog.alert(ex.reason, "There was an error")
                console.log(ex)
            }

        }

        const depositClick = async (e) => {

            let mintInfo = await teamWebService.withdraw(teamComponentService.team.tokenId)

            $f7.dialog.confirm(`<span style="text-align: left;">Click ok to begin a deposit<br /><br /> 

            <table>
                <tr>
                    <td><strong>Amount:</strong></td>
                    <td>${universeWebService.displayDiamonds(mintInfo.amount)}</td>
                </tr>
                <tr>
                    <td><strong>Address:</strong></td>
                    <td><a href="${env.PROVIDER_CHAIN_BLOCK_EXPLORER}/address/${mintInfo.to}" class="external" target="_blank">${walletService.truncateEthAddress(teamComponentService.team.ownerId)}</a></td>
                </tr>
            </table>

            <br />

            Your wallet will open to confirm a transaction.

            `, "Confirm", async () => {

                // await queueService.queuePromiseView({
                //     title: `Withdraw diamonds. Approve transaction and wait for it to be mined.`,
                //     promise: diamondService.mint(mintInfo.to, mintInfo._id, mintInfo.amount, mintInfo.tokenId, mintInfo.expires, mintInfo.v, mintInfo.r, mintInfo.s)
                // })

            }, () => { })

        }

        const getAsPercent = (value) => {
            return Math.floor(value * 100)
        }



        const PAGE_SIZE = 25

        const autoFillClick = (e) => {

            teamComponentService.autoFillLineup()

            resetMoves()

            $f7.emit('refresh')

            $update()

        }

        const saveClick = async (e) => {

            try {
                await teamComponentService.save()

                await teamComponentService.loadTeam(teamComponentService.team.tokenId, universeWebService.getStartDate())

                resetMoves()

                $f7.emit('refresh')

                $update()

                const toast = $f7.toast.create({
                    text: 'Roster saved',
                    closeTimeout: 5000,
                    position: 'bottom',
                    horizontalPosition: 'center',
                    on: {
                        opened: function () { }
                    }
                })

                toast.open()

            } catch (ex) {
                $f7.dialog.alert(ex.response.data, "There was an error")
            }

        }

        const getDisplayHitters = () => {
            return teamComponentService.getDisplayHitters()
        }

        const getDisplayPitchers = () => {
            return teamComponentService.getDisplayPitchers()
        }

        const getUnrosteredHitters = () => {
            return teamComponentService.getUnrosteredHitters()
        }

        const getUnrosteredPitchers = () => {
            return teamComponentService.getUnrosteredPitchers()
        }

        let rosterFilters = {
            position: undefined,
            name: undefined
        }

        let unrosteredFilters = {
            position: undefined,
            name: undefined
        }

        let moveFilter = {
            moveTarget: undefined,
            isMoveTarget: true,
            position: undefined,
            showEmpty: false
        }

        const moveActive = {}

        const resetMoves = () => {

            $('.button-move').addClass("button-outline")
            $('.button-move').removeClass("button-fill")
            $('.split-row-both a').show()
            $('.stats-dropdown').show()


            moveFilter.moveTarget = undefined
            moveFilter.isMoveTarget = true
            moveFilter.position = undefined
            moveFilter.showEmpty = false
            moveFilter.hidePitcherSlot = false

        }

        const moveRoster = (e) => {

            let actionRow = $(e.srcElement).data('action-row')
            let moveTarget = $(e.srcElement).data('move-target')

            //Get if move is already active
            let selectedId = moveActive[moveTarget]

            //Reset all move buttons
            resetMoves()

            moveFilter.moveTarget = moveTarget

            if (!selectedId) {

                moveFilter.moveTarget = moveTarget
                moveFilter.isMoveTarget = true
                moveFilter.position = undefined
                moveFilter.showEmpty = true
                moveFilter.hidePitcherSlot = true

                //Fill this one in.
                fillButton($(e.srcElement))

                $(`.action-row.${actionRow}`).show()

                $('.stats-dropdown').hide()

                moveActive[moveTarget] = $(e.srcElement).data('id')


            } else {

                let currentPlayerId = $(e.srcElement).data('id')
                let spot = $(e.srcElement).data('spot')

                if (currentPlayerId != selectedId) {
                    teamComponentService.moveToRoster(selectedId, currentPlayerId, parseInt(spot), 0)
                }


                resetMoves()

                $('.stats-dropdown').show()

                $(`.action-row.${actionRow}`).hide()

                moveActive[moveTarget] = undefined

            }

            $f7.emit('refresh')


            $update()

        }

        const moveUnrostered = (e) => {

            let actionRow = $(e.srcElement).data('action-row')
            let moveTarget = $(e.srcElement).data('move-target')

            //Get if move is already active
            let activeId = moveActive[moveTarget]

            //Reset all move buttons
            resetMoves()

            if (!activeId) {

                moveFilter.moveTarget = moveTarget
                moveFilter.isMoveTarget = true
                moveFilter.position = $(e.srcElement).data('position')
                moveFilter.showEmpty = true

                //Fill this one in.
                fillButton($(e.srcElement))

                //Disable previous/next
                $('.split-row-both a').hide()
                $('.stats-dropdown').hide()



                moveActive[moveTarget] = $(e.srcElement).data('id')

            } else {

                resetMoves()

                $('.split-row-both a').show()
                $('.stats-dropdown').show()


                moveActive[moveTarget] = undefined

            }

            $f7.emit('refresh')


            $update()


        }

        const drop = (e) => {

            let moveTarget = $(e.srcElement).data('move-target')
            let actionRow = $(e.srcElement).data('action-row')

            let dropId = moveActive[moveTarget]

            //   teamComponentService.dropPlayer(dropId)

            // console.log(teamComponentService.rosterPlayers.map(p => p._id))


            moveActive[moveTarget] = undefined

            // updateDisplayRoster()

            $(`.action-row.${actionRow}`).hide()
            resetMoves()

            $update()

            $f7.emit('refresh')


        }

        const showMoveRoster = (p, moveTarget) => {

            if (moveFilter.hidePitcherSlot == true && p.fullName == "Pitcher Slot") return false
            if (moveFilter.moveTarget && moveFilter.moveTarget != moveTarget) return false
            if (moveFilter.showEmpty && p?._id == undefined) return true
            if (!p) return false
            if (p._id) return true
            if (moveActive[moveTarget] && (p._id != undefined || p.primaryPosition == moveFilter.position)) return true
            if (moveFilter.position && moveFilter.position == p.primaryPosition) return true

            return false
        }

        const showMoveRosterText = (p, moveTarget) => {
            if (moveActive[moveTarget]) return "Here"
            return "Move"
        }

        const showMoveUnrostered = (p, moveTarget) => {
            if (moveActive[moveTarget] == p._id) return true
            if (moveActive[moveTarget]) return false
            if (moveFilter.position && moveFilter.position != p.primaryPosition) return false
            return true
        }

        const getActions = (type, isRostered) => {

            return () => {

                if (teamComponentService.isTeamOwner()) {

                    switch (type) {
                        case "hitters":
                            return isRostered ? rosterHittersActions : unrosteredHittersActions
                        case "pitchers":
                            return isRostered ? rosterPitchersActions : unrosteredPitchersActions
                    }

                } else {
                    return undefined
                }

            }


        }

        let rosterHittersActions = {
            drop: drop,
            move: moveRoster,
            moveTarget: "roster-hitters",
            isMoveTarget: "true",
            showMove: (p) => {
                return showMoveRoster(p, "roster-hitters")
            },
            moveText: (p) => {
                return showMoveRosterText(p, "roster-hitters")
            }
        }

        let rosterPitchersActions = {
            drop: drop,
            move: moveRoster,
            moveTarget: "roster-pitchers",
            isMoveTarget: "true",
            showMove: (p) => {
                return showMoveRoster(p, "roster-pitchers")
            },
            moveText: (p) => {
                return showMoveRosterText(p, "roster-pitchers")
            }
        }

        let unrosteredHittersActions = {
            move: moveUnrostered,
            moveTarget: "roster-hitters",
            isMoveTarget: "false",
            showMove: (p) => {
                return showMoveUnrostered(p, "roster-hitters")
            },
            moveText: (p) => {
                return "Move"
            }
        }

        let unrosteredPitchersActions = {
            move: moveUnrostered,
            moveTarget: "roster-pitchers",
            isMoveTarget: "false",
            showMove: (p) => {
                return showMoveUnrostered(p, "roster-pitchers")
            },
            moveText: (p) => {
                return "Move"
            }
        }

        const statsChange = async (e) => {

            teamComponentService.selected = $(e.srcElement).val()

            $f7.emit('refresh')

            await $update()

        }

        const positionClick = (e) => {

            // currentPage = 0

            $('.position a').removeClass("active")
            $(e.srcElement).addClass("active")

            $('#playerSearch').val("")

            let value = $(e.srcElement).data('pos')

            unrosteredFilters.position = value

            // updateDisplayRoster()

            // setCurrentPage()
            $update()

            $f7.emit('refresh')

        }

        const fillButton = (element) => {
            element.removeClass("button-outline")
            element.addClass("button-fill")
        }

        $f7.once('team-loaded', async (e) => {
            $update()
            $f7.emit('refresh')
        })

        $onMounted(async (e) => {
            authInfo = await loginWebService.getAuthInfo()
            $update()
        })

        return $render

    }
</script>
