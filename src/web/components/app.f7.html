<template>
  <div id="app">

    <!-- Status bar overlay for fullscreen mode-->
    <div class="statusbar"></div>

    <div class="panel panel-left panel-push panel-init" data-visible-breakpoint="1024">
      
          <div class="navbar">
            <div class="navbar-inner">
              <div class="left">
                <a href="/" class="logo" aria-label="Home">
                  <img src="${logo}" alt="Logo" class="logo panel-close" />
                </a>
              </div>

            </div>
          </div>

          <div class="list list-dividers-ios" style="margin-top: 0px;" >
            ${universeWebService != undefined ? $h`
              <ul>
                <li>
                  <span class="item-link smart-select" data-page-title="League"  >
                    <select name="league" @change="${leagueChange}">
                      ${leagues?.map( (l, index) => $h`

                          ${l.rank == universeWebService.rank ? $h`
                              <option value="${l.rank}" selected>${l.name}</option>
                          ` : $h`
                              <option value="${l.rank}">${l.name}</option>
                          `}

                      `)}
                    </select>
                    <div class="item-content">
                      <div class="item-inner">
                        <div class="item-title ">${leagues.find( l => l.rank == universeWebService.rank).name}</div>
                        <div class="item-after " style="display:none;"></div>
                      </div>
                    </div>
                  </span>
                </li>


                <li><a href="/" class="panel-close list-button popover-close ${tabLink == '/' ? 'active' : ''}">🏠 Home</a></li>
                <li><a href="${universeWebService.startDateLink(`/l/standings/${universeWebService.getRank()}/1`)}" class="panel-close list-button popover-close ${tabLink == `/l/standings` ? 'active' : ''}">📊 Standings</a></li>
                <li><a href="${universeWebService.fullLink(`/games`)}" class="panel-close  list-button popover-close ${tabLink == '/games' ? 'active' : ''}">🏟️ Scores</a></li>
                <li><a href="${universeWebService.fullLink(`/players/`)}"  class="panel-close  list-button popover-close ${tabLink == '/players/' ? 'active' : ''}">🧢 Players</a></li>
                <li><a href="/activity" class="panel-close list-button popover-close ${tabLink == '/activity' ? 'active' : ''}">⚡ Transactions</a></li>
                <li><a href="/about" class="panel-close  list-button popover-close ${tabLink == '/about' ? 'active' : ''}">📖 About</a></li>
                <li><a class="panel-close list-button external popover-close" href="${discord}" target="_blank">💬 Discord</a></li>
              </ul>
              
            ` : $h` `}

          </div>

          <${Footer} />

          
    </div>

    <div class="view view-init view-main" data-browser-history="true" data-browser-history-tabs="push" data-allow-duplicate-urls="true" >
      
      <${Navbar} auth=${authInfo} />
      
    </div>


  </div>
</template>

<style>

</style>

<script>

  import Navbar from "./common/navbar.f7.html"
  import Footer from "./common/footer.f7.html"

  import logo from "../html/images/logo.png"


  import { ContainerService } from "../../service/container-service"
  import { DiamondService } from "../../service/diamond-service"

  import { WalletService } from "../../service/wallet-service"
  import { UniverseWebService } from "../service/universe-web-service"
  import { LoginWebService } from "../service/login-web-service"

  import Logo from "../html/images/logo.png"


  export default (props, { $on, $f7ready, $f7, $f7router, $update }) => {

    let env
    let walletService
    let universeWebService
    let loginWebService

    let authInfo
    let tabLink 
    let discord
    let leagues



    $f7ready(async () => {

      let eventTarget = ContainerService.getInstance("eventTarget")
      env = ContainerService.getInstance("env")()
      walletService = ContainerService.getInstance("WalletService")
      universeWebService = ContainerService.getInstance(UniverseWebService)
      loginWebService = ContainerService.getInstance(LoginWebService)
      discord = ContainerService.getInstance("discord")
      leagues = ContainerService.getInstance("leagues")

      // console.log(universeWebService.getPWADisplayMode())

      eventTarget.addEventListener('main-nav', async (e) => {

        tabLink = e.detail.tabLink

        await $update()

      })



      //Just need to load this
      authInfo = await loginWebService.getAuthInfo()

      if (!walletService.provider) {
          await walletService.initProvider()
      }

      let walletAddress = await walletService.getAddress()

      if (walletAddress) {

        if (!walletService.wallet) {
          await walletService.connect()
        }

      }


      if (walletAddress && !walletService.correctNetwork) {

          // Create notification
          let switchNetworkNofication = $f7.notification.create({
              icon: '<i class="icon f7-icons">xmark_circle</i>',
              title: 'Wrong network',
              titleRightText: 'now',
              subtitle: `Connected to wrong network. Switch to '${env.PROVIDER_CHAIN_NAME}' in wallet.`,
              closeOnClick: false,
              closeButton: true
          })

          switchNetworkNofication.on('click', () => {
            walletService.switchNetwork()
          })

          // Open it
          switchNetworkNofication.open()

      }


      $update()

    })


    const leagueChange = (e) => {
        console.log("here")
        universeWebService.rank = $(e.target).val()

        let url = `/l/standings/${universeWebService.rank}?startDate=${universeWebService.getStartDate()}`

        $f7.views.main.router.navigate(url, { reloadCurrent: true })

    }

    return $render
  }

</script>
