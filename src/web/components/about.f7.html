          <h4>How Diamonds Are Introduced</h4>

            <li><strong>Season-end rewards:</strong> An additional 20,000 🔷 pool is distributed at the end of the regular season to eligible teams.</li>
          </ul>

          <h4>Emission Model</h4>
          <ul>
            <li><strong>Activity-driven:</strong> Total Diamond issuance depends on how many games are played.</li>
            <li><strong>Match quality matters:</strong> Closer matches generate more Diamonds, while large mismatches generate less and may generate none.</li>
            <li><strong>Season performance matters:</strong> Strong teams generally finish higher and earn a larger share of the season-end reward pool.</li>
          </ul>

          <h4>Where Diamonds Exist</h4>
          <ul>
            <li><strong>Off-chain by default:</strong> Team balances are tracked by the game.</li>

            <li><strong>Deposits (optional):</strong> On-chain Diamonds can be deposited back into a team’s off-chain balance.</li>
          </ul>

          <h4>Trust and Control Model</h4>
          <ul>
            <li><strong>On-chain supply is incomplete by design:</strong> Because Diamonds only exist on-chain when withdrawn, the on-chain total supply does not reflect total Diamonds earned or spent in the game.</li>
            <li><strong>Administrative control:</strong> Game administrators can modify Diamond rules and can technically mint or credit Diamonds as part of operating the game (for example: fixes, migrations, promotions, testing, or balance changes).</li>
            <li><strong>Security considerations:</strong> Like any software system, bugs or compromised keys could allow unintended Diamond creation.</li>
            <li><strong>Forked universes:</strong> Anyone can fork EBL and run their own universe with their own Diamonds, rules, and trust assumptions.</li>
          </ul>

          <p>
            In short, Diamonds are a video game currency governed by game rules and operators. The Ethereum component enables optional transfers, but the system as a whole is not designed to be trustless in isolation.
          </p>
