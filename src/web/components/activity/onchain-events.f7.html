<template>

      <div class="list media-list list-outline-ios list-strong-ios list-dividers-ios inset">
        <ul>
          ${onChainEvents.transactions?.map(tx => $h`
            <li class="transaction-li">
              <a class="item-link item-content" href="${env.PROVIDER_CHAIN_BLOCK_EXPLORER}/tx/${tx.transaction._id}" target="_blank" rel="noopener">
                <div class="item-inner">

                  <div class="item-title-row">
                    <div class="item-title">
                      ${summarizeTransaction(tx)}
                    </div>

                  </div>

                  <div class="item-subtitle">
                    ${dayjs.unix(tx.transaction.timestamp).format("ddd, MMM D, YYYY h:mm A")}
                  </div>

                  ${tx.rows?.length ? $h`
                    <div class="item-text transaction-events">
                      ${tx.rows.map(row => $h`
                        <div class="transaction-event-row">

                          <div class="transaction-event-title-row">
                            <div class="transaction-event-title">
                              ${row.title} ${row.note ? $h`<span class="badge">${row.note}</span>` : $h``}
                            </div>

                            <div class="transaction-event-after">
                              ${row.amountText ? $h`${row.amountText}` : $h``}
                            </div>
                          </div>

                          ${(row.fromAddress || row.toAddress || row.note) ? $h`
                            <div class="transaction-event-fromto">
                              ${row.fromAddress ? $h`
                                <a href="/u/activity?address=${row.fromAddress}">
                                  ${walletService.truncateEthAddress(row.fromAddress)}
                                </a>
                              ` : $h``}

                              ${(row.fromAddress && row.toAddress) ? $h`<span class="event-arrow">→</span>` : $h``}

                              ${row.toAddress ? $h`
                                <a href="/u/activity?address=${row.toAddress}">
                                  ${walletService.truncateEthAddress(row.toAddress)}
                                </a>
                              ` : $h``}

                              
                            </div>
                          ` : $h``}

                        </div>
                      `)}
                    </div>
                  ` : $h``}

                </div>
              </a>
            </li>
          `)}
        </ul>
      </div>

</template>

<script>
  import { ContainerService } from "../../../service/container-service"
  import { UniverseWebService } from "../../service/universe-web-service"
  import dayjs from "dayjs"

  export default (props, { $on, $f7, $update, $h }) => {

    const env = ContainerService.getInstance("env")()
    const walletService = ContainerService.getInstance("WalletService")
    const universeWebService = ContainerService.getInstance(UniverseWebService)

    const ZERO = "0x0000000000000000000000000000000000000000"
    const onChainEvents = props.events



    const isTransfer = (e) => (e?.event === "Transfer" || e?.isTransfer) && (e?.contractType === "DIAMONDS" || e?.contractType == null)
    const isDeposit = (e) => e?.event === "DepositToTeam"
    const isReward = (e) => e?.event === "MintReward" || e?.event === "WithdrawFromTeam"

    const sameAmount = (a, b) => a != null && b != null && String(a) === String(b)

    const formatDiamonds = (amount) => universeWebService.displayDiamonds(amount)

    const transferSign = (tr) => {
      if (!tr?.amount) return ""
      if (tr.toAddress === ZERO) return "-"
      return ""
    }

    // Build tx.rows once per tx 
    const buildRowsForTx = (tx) => {
      const events = (tx?.events || []).filter(e => e?.event)
      const transfers = events.filter(isTransfer)
      const deposits = events.filter(isDeposit)
      const rewards = events.filter(isReward)

      const usedTransferIdx = new Set()

      const takeMatchingTransfer = (amount) => {
        for (let i = 0; i < transfers.length; i++) {
          if (usedTransferIdx.has(i)) continue
          if (sameAmount(transfers[i]?.amount, amount)) {
            usedTransferIdx.add(i)
            return transfers[i]
          }
        }
        return null
      }

      const rows = []

      for (const d of deposits) {
        const tr = takeMatchingTransfer(d.amount)
        rows.push({
          title: "Deposit",
          amountText: d.amount ? formatDiamonds(d.amount) : "",
          fromAddress: tr?.fromAddress || d.fromAddress,
          toAddress: tr?.toAddress || d.toAddress,
          note: d.offChainEventId ? "" : "Pending"
        })
      }

      for (const r of rewards) {
        const tr = takeMatchingTransfer(r.amount)
        rows.push({
          title: (r.event === "MintReward") ? "Reward" : "Withdraw",
          amountText: r.amount ? formatDiamonds(r.amount) : "",
          fromAddress: tr?.fromAddress || r.fromAddress,
          toAddress: tr?.toAddress || r.toAddress,
          note: ""
        })
      }

      for (let i = 0; i < transfers.length; i++) {
        if (usedTransferIdx.has(i)) continue
        const tr = transfers[i]
        rows.push({
          title: "Diamonds transfer",
          amountText: tr.amount ? `${transferSign(tr)}${formatDiamonds(tr.amount)}` : "",
          fromAddress: tr.fromAddress,
          toAddress: tr.toAddress,
          note: ""
        })
      }

      const leftovers = events.filter(e => !isTransfer(e) && !isDeposit(e) && !isReward(e))
      for (const e of leftovers) {
        rows.push({
          title: e.event,
          amountText: e.amount ? formatDiamonds(e.amount) : "",
          fromAddress: e.fromAddress,
          toAddress: e.toAddress,
          note: ""
        })
      }

      return rows
    }

    console.log(onChainEvents)

    if (onChainEvents?.transactions?.length) {
      onChainEvents.transactions.forEach(tx => {
        tx.rows = buildRowsForTx(tx)
      })
    }

    const summarizeTransaction = (tx) => {

        const rows = tx?.rows || []
        if (!rows.length) return "On-chain transaction"

        const deposits = rows.filter(r => r.title === "Deposit").length
        const rewards = rows.filter(r => r.title === "Reward").length
        const withdraws = rows.filter(r => r.title === "Withdraw").length
        const transfers = rows.filter(r => r.title === "Diamonds transfer").length

        const primaryCount = deposits + rewards + withdraws

        // Friendly single-action labels
        if (primaryCount === 1) {
            if (deposits === 1) return "Diamond deposit"
            if (rewards === 1) return "Minted rewards"
            if (withdraws === 1) return "Diamond withdrawal"
        }

        // If it's only transfers (no deposit/reward/withdraw)
        if (primaryCount === 0 && transfers > 0) {
            return transfers === 1 ? "Diamonds transfer" : "Diamonds transfers"
        }

        // Otherwise fall back to counts
        const parts = []
        if (deposits) parts.push(`${deposits} deposit${deposits === 1 ? "" : "s"}`)
        if (rewards) parts.push(`${rewards} reward${rewards === 1 ? "" : "s"}`)
        if (withdraws) parts.push(`${withdraws} withdrawal${withdraws === 1 ? "" : "s"}`)

        // (Optional) include extra transfers only when there are transfers beyond the matched ones
        if (primaryCount > 0 && transfers) parts.push(`${transfers} transfer${transfers === 1 ? "" : "s"}`)

        return parts.length ? parts.join(", ") : "On-chain activity"
    }


    return $render
  }
</script>
