<template>

  <div class="list media-list list-outline-ios list-strong-ios list-dividers-ios">
    <ul>
      ${eventsViewModel.transactions.map(tx => $h`
        <li class="transaction-li">
          <div class="item-content">
            <div class="item-inner">

              <div class="item-title-row">
                <div class="item-title">
                  ${summarizeTransaction(tx)}
                </div>
              </div>

              <div class="item-subtitle">
                ${dayjs(tx.events[0].dateCreated).format("ddd, MMM D, YYYY h:mm A")}
              </div>

              <div class="item-text transaction-events">
                ${tx.events.map(oce => $h`
                  <div class="transaction-event-row">

                    <div class="transaction-event-title-row">
                      <div class="transaction-event-title">
                        ${renderDescription(oce)}
                      </div>
                      <div class="transaction-event-after">
                        ${getOffChainAmount(oce)}
                      </div>
                    </div>

                    <div class="transaction-event-fromto">
                      ${oce.fromTeamId ? $h`
                        <a href="${universeWebService.startDateLink(`/t/index/${oce.fromTeamId}`)}">
                          ${teamWebService.getTeamName(getTeam(oce.fromTeamId))}
                        </a>
                      ` : $h``}

                      ${oce.fromAddress ? $h`
                        <a href="/u/activity?address=${oce.fromAddress}">
                          ${walletService.truncateEthAddress(oce.fromAddress)}
                        </a>
                      ` : $h``}

                      ${((oce.fromTeamId || oce.fromAddress) && (oce.toTeamId || oce.toAddress)) ? $h`
                        <span class="event-arrow"> ➡️ </span>
                      ` : $h``}

                      ${oce.toTeamId ? $h`
                        <a href="${universeWebService.startDateLink(`/t/index/${oce.toTeamId}`)}">
                          ${teamWebService.getTeamName(getTeam(oce.toTeamId))}
                        </a>
                      ` : $h``}

                      ${oce.toAddress ? $h`
                        <a href="/u/activity?address=${oce.toAddress}">
                          ${walletService.truncateEthAddress(oce.toAddress)}
                        </a>
                      ` : $h``}
                    </div>

                  </div>
                `)}
              </div>

            </div>
          </div>
        </li>
      `)}
    </ul>
  </div>

</template>

<script>
  
  import { ContainerService } from "../../../service/container-service"
  import { WalletService } from "../../../service/wallet-service"
  import { LoginWebService } from "../../service/login-web-service"
  import { UniverseWebService } from "../../service/universe-web-service"
  import { GameWebService } from "../../service/game-web-service"
  import { TeamWebService } from "../../service/team-web-service"

  import logo from "../../html/images/logo.png"
  import { ethers } from "ethers"
  import dayjs from "dayjs"

  export default (props, { $on, $f7, $update, $h }) => {

    let walletService = ContainerService.getInstance("WalletService")
    let eventTarget = ContainerService.getInstance("eventTarget")
    let loginWebService = ContainerService.getInstance(LoginWebService)
    let universeWebService = ContainerService.getInstance(UniverseWebService)
    let gameWebService = ContainerService.getInstance(GameWebService)
    let teamWebService = ContainerService.getInstance(TeamWebService)

    let eventsViewModel = props.model

    const ZERO = "0x0000000000000000000000000000000000000000"

    const getTeam = (teamId) => eventsViewModel.teams?.find(t => t._id == teamId)
    const getPlayer = (playerId) => eventsViewModel.players?.find(p => p._id == playerId)

    const renderPlayerNode = (oce) => {
      const player = getPlayer(oce.playerId)
      const playerName = player?.fullName || "Player"
      const href = oce.playerId ? universeWebService.startDateLink(`/p/${oce.playerId}`) : null
      return href ? $h`<a href="${href}">${playerName}</a>` : $h`${playerName}`
    }

    const renderTeamNode = (teamId) => {
      const team = getTeam(teamId)
      const name = team?.name || "Team"
      const href = universeWebService.startDateLink(`/t/index/${teamId}`)
      return $h`<a href="${href}">${name}</a>`
    }

    const isRewardMint = (oce) =>
      oce?.contractType === "DIAMONDS" &&
      oce?.event === "Transfer" &&
      oce?.fromAddress === ZERO &&
      oce?.source?.type === "reward" &&
      (oce?.source?.rewardType === "daily" || oce?.source?.rewardType === "season")

    const getRewardLabel = (oce) => {
      if (!isRewardMint(oce)) return null
      if (oce.source.rewardType === "daily") return "Daily reward"
      if (oce.source.rewardType === "season") return "Season reward"
      return "Reward"
    }

    const getOffChainAmount = (oce) => {
      if (oce?.contractType !== "DIAMONDS" || oce?.event !== "Transfer") return

      const amt = universeWebService.displayDiamonds(oce.amount)
      if (!amt) return

      // if (oce.toAddress === ZERO) return `-${amt}`
      return `${amt}`
    }

    const renderDescription = (oce) => {

      if (oce?.contractType == "PLAYERS" && oce?.event == "Transfer") {

        const playerNode = renderPlayerNode(oce)

        if (oce.fromTeamId && !oce.toTeamId) {
          return $h`${playerNode} dropped to free agent pool from ${renderTeamNode(oce.fromTeamId)}.`
        }

        if (!oce.fromTeamId && oce.toTeamId) {
          return $h`${playerNode} transferred from free agent pool to ${renderTeamNode(oce.toTeamId)}.`
        }

        if (oce.fromTeamId && oce.toTeamId) {
          return $h`${playerNode} transferred from ${renderTeamNode(oce.fromTeamId)} to ${renderTeamNode(oce.toTeamId)}.`
        }

        return $h`${playerNode} transferred.`
      }



      if (oce?.contractType == "DIAMONDS" && oce?.event == "Transfer") {
        const rewardLabel = getRewardLabel(oce)
        if (rewardLabel) return $h`${rewardLabel}`
        return $h`Diamond transfer`
      }

      if (oce?.contractType && oce?.event) return $h`${oce.contractType} ${oce.event}`
      return $h`Event`
    }

    const summarizeTransaction = (tx) => {
      const events = tx?.events || []
      if (!events.length) return "Transaction"

      const playerTransfers = events.filter(e => e?.contractType === "PLAYERS" && e?.event === "Transfer")
      const diamondTransfers = events.filter(e => e?.contractType === "DIAMONDS" && e?.event === "Transfer")

      // If it’s only diamonds, summarize rewards nicely, otherwise “Diamond transfer”.
      const onlyDiamonds = diamondTransfers.length > 0 && playerTransfers.length === 0 && events.length === diamondTransfers.length

      if (onlyDiamonds) {
        const daily = diamondTransfers.filter(e => isRewardMint(e) && e.source.rewardType === "daily").length
        const season = diamondTransfers.filter(e => isRewardMint(e) && e.source.rewardType === "season").length
        const other = diamondTransfers.length - daily - season

        // Single-event friendly headers
        if (diamondTransfers.length === 1) {
          if (daily === 1) return "Daily rewards"
          if (season === 1) return "Season rewards"
          return "Diamond transfer"
        }

        // Multi-event headers
        const parts = []
        if (daily) parts.push(`${daily} daily reward${daily === 1 ? "" : "s"}`)
        if (season) parts.push(`${season} season reward${season === 1 ? "" : "s"}`)
        if (other) parts.push(`${other} transfer${other === 1 ? "" : "s"}`)
        return parts.length ? parts.join(", ") : "Diamonds"
      }

      if (playerTransfers.length === 1) {
        const oce = playerTransfers[0]
        const playerNode = renderPlayerNode(oce)

        if (oce.fromTeamId && !oce.toTeamId) return $h`${playerNode} dropped by ${renderTeamNode(oce.fromTeamId)}`
        if (!oce.fromTeamId && oce.toTeamId) return $h`${playerNode} signed by ${renderTeamNode(oce.toTeamId)}`
        if (oce.fromTeamId && oce.toTeamId) return $h`${playerNode} traded from ${renderTeamNode(oce.fromTeamId)} to ${renderTeamNode(oce.toTeamId)}`
        return $h`${playerNode} moved`
      }

      if (playerTransfers.length > 1) {
        const drops = playerTransfers.filter(e => e?.fromTeamId && !e?.toTeamId).length
        const signs = playerTransfers.filter(e => !e?.fromTeamId && e?.toTeamId).length
        const trades = playerTransfers.filter(e => e?.fromTeamId && e?.toTeamId).length

        const parts = []
        if (signs) parts.push(`${signs} signed`)
        if (drops) parts.push(`${drops} dropped`)
        if (trades) parts.push(`${trades} traded`)
        return parts.length ? parts.join(", ") : "Player moves"
      }

      // Mixed tx (players + diamonds, etc.)
      if (diamondTransfers.length > 0 && playerTransfers.length === 0) {
        // If it’s diamonds + other non-player stuff, keep it simple.
        const daily = diamondTransfers.filter(e => isRewardMint(e) && e.source.rewardType === "daily").length
        const season = diamondTransfers.filter(e => isRewardMint(e) && e.source.rewardType === "season").length
        if (diamondTransfers.length === 1 && daily === 1) return "Daily rewards"
        if (diamondTransfers.length === 1 && season === 1) return "Season rewards"
        return "Diamond transfer"
      }

      return "Transaction"
    }

    return $render
  }
</script>
