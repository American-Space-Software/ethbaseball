            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.pa')}" data-sort="hitting.pa">PA</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.atBats')}" data-sort="hitting.atBats">AB</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.runs')}" data-sort="hitting.runs">R</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.hits')}" data-sort="hitting.hits">H</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.doubles')}" data-sort="hitting.doubles">2B</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.triples')}" data-sort="hitting.triples">3B</th>

            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.cs')}" data-sort="hitting.cs">CS</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.bb')}" data-sort="hitting.bb">BB</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.so')}" data-sort="hitting.so">SO</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.bbPercent')}" data-sort="hitting.bbPercent">BB%</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.soPercent')}" data-sort="hitting.soPercent">SO%</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.po')}" data-sort="hitting.po">PO</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.assists')}" data-sort="hitting.assists">AST</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.outfieldAssists')}" data-sort="hitting.outfieldAssists">OFA</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.e')}" data-sort="hitting.e">E</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.avg')}" data-sort="hitting.avg">BA</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.obp')}" data-sort="hitting.obp">OBP</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.slg')}" data-sort="hitting.slg">SLG</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.ops')}" data-sort="hitting.ops">OPS</th>
            <th @click=${sortRows} class="numeric-cell ${getSortHeaderClass('hitting.wpa')}" data-sort="hitting.wpa">WPA</th>
          </tr>
        </thead>

        <tbody>
          ${displayHitters?.length > 0 ? $h`

            ${displayHitters?.map((p, index) => $h`
              <tr>

                ${actions ? $h`
                  <td class="action">
                    ${actions.showMove(p) ? $h`
                      <a @click="${actions.move}" class="button button-outline button-move" data-id="${p._id}" data-position="${p.primaryPosition}" data-action-row="hitter-stats" data-move-target="${actions.moveTarget}" data-is-move-target="${actions.isMoveTarget}" data-spot="${index}">${actions.moveText(p)}</a>
                    ` : $h` `}
                  </td>
                ` : $h` `}

                <td class="image">
                  ${p?._id ? $h`
                    <span class="icon">
                      <img src="/player/image/${p._id}" />
                      <span class="badge ${playerWebService.getRatingBadgeColor(p.displayRating)}">
                        ${p.displayRating.toFixed(0)}
                      </span>
                    </span>
                  ` : $h`<span />`}
                </td>


                <td class="name">
                  ${p?._id || p?.primaryPosition ? $h`

                    ${p?._id ? $h`
                      <a href="${universeWebService.startDateLink(`/p/${p._id}`)}">${p.fullName}</a><br />
                    ` : $h`
                      <a href="${universeWebService.startDateLink(`/players/?position=${p?.primaryPosition}&rank=0`)}" style="font-weight: normal;">${p.fullName}</a><br />
                    `}

                    ${p.team ? $h`<span class="position">${teamWebService.getTeamName(p.team)}</span> - ` : $h` `} <span class="position">${p.primaryPosition}</span>

                  ` : $h` `}
                </td>



                ${showAskingPrice ? $h`
                  <td class="numeric-cell">${universeWebService.displayDiamonds(p.askingPrice)}</td>
                ` : $h` `}

                <td class="numeric-cell">${p?.displayRating?.toFixed(0)}</td>
                <td>${p?.hits}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.games}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.pa}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.atBats}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.runs}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.hits}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.doubles}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.triples}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.homeRuns}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.rbi}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.sb}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.cs}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.bb}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.so}</td>
                <td class="numeric-cell">${statService.displayPercent(getStats(p)?.hitting?.bbPercent)}</td>
                <td class="numeric-cell">${statService.displayPercent(getStats(p)?.hitting?.soPercent)}</td>

                <td class="numeric-cell">${getStats(p)?.hitting?.po}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.assists}</td>

                <td class="numeric-cell">${statService.formatRatio(getStats(p)?.hitting?.obp)}</td>
                <td class="numeric-cell">${statService.formatRatio(getStats(p)?.hitting?.slg)}</td>
                <td class="numeric-cell">${statService.formatRatio(getStats(p)?.hitting?.ops)}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.wpa?.toFixed(3)}</td>

              </tr>
            `)}

          ` : $h`
            <tr>
              <td colspan="30">No hitters on roster.</td>
            </tr>
          `}
        </tbody>
      </table>
    </div>

  </div>

</template>

<style>
</style>

<script>

  import { ContainerService } from "../../../service/container-service"
  import { StatService } from "../../../service/stat-service.ts"
  import { PlayerWebService } from "../../service/player-web-service.ts"
  import { UniverseWebService } from "../../service/universe-web-service.ts"
  import { TeamWebService } from "../../service/team-web-service.ts"
  import { PagingService } from "../../../service/paging-service.ts"

  export default (props, { $, $on, $f7, $update }) => {

    let statService = ContainerService.getInstance(StatService)
    let playerWebService = ContainerService.getInstance(PlayerWebService)
    let universeWebService = ContainerService.getInstance(UniverseWebService)
    let teamWebService = ContainerService.getInstance(TeamWebService)

    let pagingService = ContainerService.getInstance(PagingService)





    let currentPage = 0
    const PAGE_SIZE = props.pagesize

    let statprop
    if (props.statprop) {
      statprop = props.statprop
    }

    let actions
    if (props.actions) {
      actions = props.actions()
    }

    let showAskingPrice = false
    if (props.showaskingprice) {
      showAskingPrice = true
    }

    const moveFilter = props.movefilter
    const sortable = props.sortable == "true"

    let sortColumn = props.sortcolumn
    let sortDirection = props.sortdirection

    let displayHitters = props.hitters
    let sortRows = props.sortrows

    const getSortClass = (sortDirection) => {
      return sortDirection == 'DESC' ? 'sortable-asc' : 'sortable-desc'
    }

    const isActiveSort = (col) => sortable && sortColumn === col

    const getSortHeaderClass = (col) => {
      if (!sortable) return ''
      if (sortColumn !== col) return 'sortable-cell'
      return `sortable-cell sortable-cell-active ${getSortClass(sortDirection)}`
    }

    const getStats = (p) => {
      if (!p) return
      return p[statprop]
    }

    const showMoveButton = (player, moveTarget) => {
      showMoveButton(p, "hitter-stats")
    }

    return $render
  }
</script>
