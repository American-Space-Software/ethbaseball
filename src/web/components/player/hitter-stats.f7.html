<template>

  <div>

    <div class="paging">
      Showing ${pagingService.startIndex(PAGE_SIZE, currentPage) + 1}-${Math.min(pagingService.endIndex(PAGE_SIZE, currentPage) + 1, effectiveHitters.length)} of ${effectiveHitters.length} hitters.
      <slot></slot>
    </div>

    <div class="stat-table-wrapper">
      <table class="data-table players ${actions ? $h`actions`: $h` `}">
        <thead>
          <tr>
            ${actions ? $h`<th class="action"></th>` : $h` `}  
            <th class="image"></th>
            <th @click=${sortHitters} data-sort="fullName" class="name">Name</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="percentileRatings.overallRating_pct">OVR</th>          
            <th @click=${sortHitters} class="numeric-cell" data-sort="age">Age</th>
            <th @click=${sortHitters} data-sort="throws">Throws</th>
            <th @click=${sortHitters} data-sort="hits">Bats</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.games">G</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.pa">PA</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.atBats">AB</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.runs">R</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.hits">H</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.doubles">2B</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.triples">3B</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.homeRuns">HR</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.rbi">RBI</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.sb">SB</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.cs">CS</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.bb">BB</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.so">SO</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.bbPercent">BB%</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.soPercent">SO%</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.po">PO</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.assists">AST</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.outfieldAssists">OFA</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.e">E</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.avg">BA</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.obp">OBP</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.slg">SLG</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.ops">OPS</th>
            <th @click=${sortHitters} class="numeric-cell" data-sort="${statprop}.hitting.wpa">WPA</th>
          </tr>
        </thead>
        <tbody>
          ${displayHitters?.length > 0 ? $h`
    
            ${displayHitters?.map( (p, index) => $h`
              <tr>

                ${actions ? $h`
                  <td class="action">
                    ${actions.showMove(p) ? $h`
                      <a @click="${actions.move}" class="button button-outline button-move" data-id="${p._id}" data-position="${p.primaryPosition}" data-action-row="hitter-stats" data-move-target="${actions.moveTarget}" data-is-move-target="${actions.isMoveTarget}" data-spot="${index}">${actions.moveText(p)}</a>    
                    ` : $h` `}
                  </td>
                ` : $h` `}

                <td class="image">
                  ${p?._id ? $h`<img src="/player/image/${p._id}" width="25" height="25" />` : $h`<span />`}
                </td>

                <td class="name">
                  ${p?._id || p?.primaryPosition ? $h`

                  
                    ${p?._id ? $h`
                      <a href="${universeWebService.startDateLink(`/p/${p._id}`)}">${p.fullName}</a><br />
                    ` : $h` 
                      ${p?.fullName ? $h`${p?.fullName}<br />` : $h` `}
                    `}

                    ${p.team?.abbrev ? $h`<a href="${universeWebService.startDateLink(`/t/${p.team?.tokenId}`)}" class="position">${p.team?.cityName} (${p.team?.abbrev})</a> - ` : $h`<span />`}<span class="position">${p.primaryPosition}</span>

                  ` : $h` `}
                </td>
                


                <td class="numeric-cell">${p?.percentileRatings?.overallRating_pct?.toFixed(1)}</td>
                <td class="numeric-cell">${p?.age}</td>
                <td>${p?.throws}</td>
                <td>${p?.hits}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.games}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.pa}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.atBats}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.runs}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.hits}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.doubles}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.triples}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.homeRuns}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.rbi}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.sb}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.cs}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.bb}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.so}</td>
                <td class="numeric-cell">${statService.displayPercent(getStats(p)?.hitting?.bbPercent)}</td>
                <td class="numeric-cell">${statService.displayPercent(getStats(p)?.hitting?.soPercent)}</td>

                <td class="numeric-cell">${getStats(p)?.hitting?.po}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.assists}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.outfieldAssists}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.e}</td>

                <td class="numeric-cell">${statService.formatRatio(getStats(p)?.hitting?.avg)}</td>
                <td class="numeric-cell">${statService.formatRatio(getStats(p)?.hitting?.obp)}</td>
                <td class="numeric-cell">${statService.formatRatio(getStats(p)?.hitting?.slg)}</td>
                <td class="numeric-cell">${statService.formatRatio(getStats(p)?.hitting?.ops)}</td>
                <td class="numeric-cell">${getStats(p)?.hitting?.wpa?.toFixed(3)}</td>

              </tr>
            `)}

    
          ` : $h`
          <tr>
            <td colspan="30">No hitters on roster.</td>
          </tr>
    
          `}
        </tbody>
      </table>
    </div>

  
    <div class="block split-row-both">
        <div>
            ${pagingService.hasPreviousPage(PAGE_SIZE, currentPage, effectiveHitters) ? $h`
                <a @click="${previousClick}" class="button button-outline color-gray">Previous</a>
            ` : $h` `}
        </div>
        <div>
            ${pagingService.hasNextPage(PAGE_SIZE, currentPage, effectiveHitters) ? $h`
                <a @click="${nextClick}" class="button button-fill">Next</a>
            ` : $h` `}
        </div>
  
    </div>

  </div>




</template>

<style>


</style>

<script>


  import { ContainerService } from "../../../service/container-service"
  import { StatService } from "../../../service/stat-service.ts"
  import { PlayerWebService } from "../../service/player-web-service.ts"
  import { UniverseWebService } from "../../service/universe-web-service.ts"

  import { PagingService } from "../../../service/paging-service.ts"

  export default (props, { $, $on, $f7, $update }) => {

    let statService = ContainerService.getInstance(StatService)
    let playerWebService = ContainerService.getInstance(PlayerWebService)
    let universeWebService = ContainerService.getInstance(UniverseWebService)

    let pagingService = ContainerService.getInstance(PagingService)

    let currentPage = 0

    const PAGE_SIZE = props.pagesize

    let statprop

    if (props.statprop) {
      statprop = props.statprop
    }

    let actions

    if (props.actions) {
      actions = props.actions()
    }

    const moveFilter = props.movefilter
    const sortable = props.sortable == "true"

    let effectiveHitters = []
    let displayHitters = []

    const getStats = (p) => {
      if (!p) return
      return p[statprop]
    }


    const showMoveButton = (player, moveTarget) => {
      showMoveButton(p, "hitter-stats")
    }

    const setEffectiveHitters = (hitters) => {
      effectiveHitters = hitters
    }

    const sortHitters = (e) => {

        if (sortable) {
          playerWebService.sort($, e, '.hitters', effectiveHitters)
          currentPage = 0
          setCurrentPage()
          $update()
        }

    }

    const nextClick = (e) => {
        currentPage++
        setCurrentPage()
        $update()
    }

    const previousClick = (e) => {
        currentPage--
        setCurrentPage()
        $update()
    }

    const setCurrentPage = (hitters) => {

      if (hitters) {
        effectiveHitters = hitters
      }

      let start = pagingService.startIndex(PAGE_SIZE, currentPage)
      let end = pagingService.endIndex(PAGE_SIZE, currentPage)

      displayHitters.length = 0

      if (props.filters?.position) {
        effectiveHitters = effectiveHitters.filter(p => p.primaryPosition == props.filters.position)
      } else if (props.filters?.name) {
        effectiveHitters = effectiveHitters.filter(p => p.fullName.toLowerCase().indexOf(props.filters.name.toLowerCase()) >= 0)
      } 

      displayHitters.push(...effectiveHitters.slice(start, end))


    }

    setCurrentPage(props.hitters())

    $f7.on('refresh', (cb) => {

      if (props.actions) {
        actions = props.actions()
      }
      
      if (props.statprop) {
        statprop = props.statprop
      }

      setCurrentPage(props.hitters())
      $update()
      if (cb) cb()
    })


    return $render
  }
</script>
