<template>

  <div>

    <div class="paging">
        Showing ${pagingService.startIndex(PAGE_SIZE, currentPage) + 1}-${Math.min(pagingService.endIndex(PAGE_SIZE, currentPage) + 1, effectivePitchers.length)} of ${effectivePitchers.length} pitchers.
        <slot></slot>
    
    </div>

    <div class="stat-table-wrapper">
        <table class="data-table players ${actions ? $h`actions`: $h` `}">
            <thead>
                <tr>
                    ${actions ? $h`<th class="action"></th>` : $h` `} 
                    <th class="image"></th>
                    <th @click=${sortPitchers} data-sort="fullName" class="name">Name</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="percentileRatings.overallRating_pct">OVR</th>                    
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="age">Age</th>
                    <th @click=${sortPitchers} data-sort="throws">Throws</th>
                    <th @click=${sortPitchers} data-sort="hits">Bats</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.wins">W</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.losses">L</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.winPercent">W/L%</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.era">ERA</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.starts">GS</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.outs">IP</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.hits">H</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.runs">R</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.er">ER</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.hr">HR</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.bb">BB</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.so">SO</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.bbPercent">BB%</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.soPercent">SO%</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.hbp">HBP</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.bf">BF</th>
                    <th @click=${sortPitchers} class="numeric-cell" data-sort="${statprop}.pitching.wpa">WPA</th>

                </tr>
            </thead>
            <tbody>
                ${displayPitchers?.length > 0 ? $h`
                
                    ${displayPitchers?.map( (p, index) => $h`
                        <tr>

                            ${actions ? $h`
                                <td class="action">
                                    ${actions.showMove(p) ? $h`
                                        <a @click="${actions.move}" class="button button-outline button-move" data-id="${p._id}" data-position="${p.primaryPosition}" data-action-row="pitcher-stats" data-move-target="${actions.moveTarget}" data-is-move-target="${actions.isMoveTarget}" data-spot="${index}">${actions.moveText(p)}</a>  
                                    ` : $h``}
                                </td>
                            ` : $h` `}

                            <td class="image">
                              ${p?._id ? $h`<img src="/player/image/${p._id}" width="25" height="25" />` : $h`<span />`}
                            </td>


                            <td class="name ${p.isNextStarter ? $h`next-starter` : $h` `}">

                                ${p?._id ? $h`
                                    <a href="${universeWebService.startDateLink(`/p/${p._id}`)}">${p.fullName}</a><br />
                                    ${p.team?.abbrev ? $h`<a href="${universeWebService.startDateLink(`/t/${p.team?.tokenId}`)}" class="position">${p.team?.cityName} (${p.team?.abbrev})</a> - ` : $h`<span />`}<span class="position">${p.primaryPosition}</span> <span class="rest">${playerWebService.displayRestDays(p, universeWebService.getCurrentDate())}</span>
                                ` : $h` `}
                            </td>
                            
                            <td class="numeric-cell">${p?.percentileRatings?.overallRating_pct?.toFixed(1)}</td>

                            <td class="numeric-cell">${p?.age}</td>
                            <td>${p?.throws}</td>
                            <td>${p?.hits}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.wins}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.losses}</td>
                            <td class="numeric-cell">${statService.formatRatio(getStats(p)?.pitching?.winPercent)}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.era != undefined ? getStats(p)?.pitching?.era.toFixed(2) : "∞"}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.starts}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.ip}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.hits}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.runs}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.er}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.homeRuns}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.bb}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.so}</td>
                            <td class="numeric-cell">${statService.displayPercent(getStats(p)?.pitching?.bbPercent)}</td>
                            <td class="numeric-cell">${statService.displayPercent(getStats(p)?.pitching?.soPercent)}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.hbp}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.battersFaced}</td>
                            <td class="numeric-cell">${getStats(p)?.pitching?.wpa?.toFixed(3)}</td>
                        </tr>
                    `)}


                    <!-- ${actions?.drop ? $h`
                        <tr class="action-row pitcher-stats" style="display:none;">
                          <td colspan="3">
                            <a @click=${actions.drop} class="drop-button button button-outline color-red" data-action-row="pitcher-stats" data-move-target="${actions.moveTarget}">Drop</div>
                          </td>
                          <td colspan="21"></td>
                        </tr>
                      ` : $h` `} -->

                ` : $h`
                        <tr>
                            <td colspan="24">No pitchers on roster.</td>
                        </tr>
                
                `}
            </tbody>                            
        </table>
    </div>

    <div class="block split-row-both">
        <div>
            ${pagingService.hasPreviousPage(PAGE_SIZE, currentPage, effectivePitchers) ? $h`
                <a @click="${previousClick}" class="button button-outline color-gray">Previous</a>
            ` : $h` `}
        </div>
        <div>
            ${pagingService.hasNextPage(PAGE_SIZE, currentPage, effectivePitchers) ? $h`
                <a @click="${nextClick}" class="button button-fill">Next</a>
            ` : $h` `}
        </div>

    </div>

  </div>


</template>

<style>


</style>

<script>


  import { ContainerService } from "../../../service/container-service"
  import { StatService } from "../../../service/stat-service.ts"
  import { PlayerWebService } from "../../service/player-web-service.ts"
  import { PagingService } from "../../../service/paging-service.ts"
  import { UniverseWebService } from "../../service/universe-web-service.ts"

  export default (props, { $, $on, $f7, $update }) => {

    let statService = ContainerService.getInstance(StatService)
    let playerWebService = ContainerService.getInstance(PlayerWebService)
    let pagingService = ContainerService.getInstance(PagingService)
    let universeWebService = ContainerService.getInstance(UniverseWebService)

    let currentPage = 0

    let statprop

    if (props.statprop) {
      statprop = props.statprop
    }

    let actions

    if (props.actions) {
      actions = props.actions()
    }

    const moveFilter = props.movefilter
    const sortable = props.sortable == "true"

    const PAGE_SIZE = props.pagesize

    let effectivePitchers = []
    let displayPitchers = []

    const getStats = (p) => {
      if (!p) return
      return p[statprop]
    }

    const sortPitchers = (e) => {

        if (sortable) {
            playerWebService.sort($, e, '.pitchers', effectivePitchers)
            currentPage = 0
            setCurrentPage()
            $update()
        }

    }

    const nextClick = (e) => {
        currentPage++
        setCurrentPage()
        $update()
    }

    const previousClick = (e) => {
        currentPage--
        setCurrentPage()
        $update()
    }

    const setCurrentPage = (pitchers) => {

      if (pitchers) {
        effectivePitchers = pitchers
      }

      let start = pagingService.startIndex(PAGE_SIZE, currentPage)
      let end = pagingService.endIndex(PAGE_SIZE, currentPage)

      displayPitchers.length = 0

      if (props?.filters?.name) {
        effectivePitchers = effectivePitchers.filter(p => p.fullName.toLowerCase().indexOf(props.filters.name.toLowerCase()) >= 0)
      } 

    
      displayPitchers.push(...effectivePitchers.slice(start, end))

    }


    setCurrentPage(props.pitchers())


    $f7.on('refresh', (cb) => {

      if (props.actions) {
        actions = props.actions()
      }

      if (props.statprop) {
        statprop = props.statprop
      }

      setCurrentPage(props.pitchers())
      $update()
      if (cb) cb()
    })


    return $render
  }
</script>
