<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="EBL Maskable Icon">
  <title>EBL Maskable Icon</title>
  <defs>
    <style>
      .bg { fill: #0b2f57; }
      .plate { fill: #ffffff; stroke: #c3273c; stroke-width: 28; stroke-linejoin: round; }
      .word { fill: #0b2f57; font-weight: 1000; font-size: 300px; text-anchor: middle; letter-spacing: 8; font-family: "Times New Roman","Georgia","Garamond",serif; }
      .emoji { font-size: 260px; text-anchor: middle; font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; }
    </style>
  </defs>

  <!-- Full-bleed navy (no rounded corners for maskable) -->
  <rect class="bg" x="0" y="0" width="1024" height="1024"/>

  <!-- Safe area inset (12.5% all sides) -->
  <g transform="translate(128,128)">
    <!-- Home plate scaled to safe area -->
    <polygon class="plate" points="40,30 728,30 728,384 384,780 40,384" />

    <!-- EBL text centered in the square portion -->
    <text class="word" x="384" y="320">EBL</text>

    <!-- Baseball emoji inside the triangle -->
    <text class="emoji" x="384" y="600">⚾</text>
  </g>
</svg>
